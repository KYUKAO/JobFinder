<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TA Job Finder — 今日简报</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #007AFF;
      --primary-light: #5AC8FA;
      --accent: #FF6B35;
      --accent-warm: #FF9500;
      --bg: #F5F7FA;
      --card: #fff;
      --text: #1A1A2E;
      --text-secondary: #666;
      --border: #E8ECF0;
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #007AFF 0%, #5AC8FA 100%);
      padding: 48px 40px 60px;
      text-align: center;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 40px;
      background: var(--bg);
      border-radius: 50% 50% 0 0;
    }
    .header-eyebrow {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.7);
      margin-bottom: 10px;
    }
    header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }
    header p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.85);
    }
    #date-badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-top: 10px;
    }

    /* Main */
    .main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 60px;
      width: 100%;
    }

    /* Section headers */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-secondary);
    }
    .section-count {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 700;
    }

    /* Today's highlight bar */
    .today-bar {
      background: linear-gradient(135deg, #FF6B35, #FF9500);
      color: #fff;
      padding: 16px 24px;
      border-radius: 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .today-bar .today-num {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }
    .today-bar .today-label {
      font-size: 0.85rem;
      opacity: 0.9;
      line-height: 1.4;
    }

    /* Job card grid */
    .job-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }

    .job-card {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      border: 2px solid transparent;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .job-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.12);
    }
    .job-card.is-new {
      border-color: var(--accent);
    }
    .job-card.is-new::before {
      content: '🆕 今日新';
      position: absolute;
      top: -1px; right: 16px;
      background: var(--accent);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 0 0 8px 8px;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 8px;
    }
    .card-company {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--primary);
    }
    .card-area {
      font-size: 0.7rem;
      color: #999;
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .card-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 600;
    }
    .badge-fulltime { background: #E8F4FF; color: var(--primary); }
    .badge-contractor { background: #F3E8FF; color: #AF52DE; }
    .badge-aaa { background: #FFF0EB; color: var(--accent); }
    .badge-indie { background: #FFF8E8; color: var(--accent-warm); }
    .badge-intern { background: #F3E8FF; color: #AF52DE; }
    .badge-fang { background: #E8F9FD; color: #00B4D8; }
    .badge-salary { background: #E8F9ED; color: #34C759; }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .card-distance {
      color: var(--primary);
      font-weight: 600;
    }
    .card-link {
      font-size: 0.75rem;
      color: var(--primary);
      font-weight: 600;
    }

    /* All jobs link */
    .all-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 32px;
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      margin-bottom: 48px;
    }
    .all-link:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: #F0F7FF;
    }

    /* Mini map */
    .mini-map-section {
      margin-bottom: 48px;
    }
    .mini-map-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    #mini-map {
      height: 280px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.75rem;
      color: #bbb;
    }

    @media (max-width: 640px) {
      .job-grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-eyebrow">Daily Brief · 每日简报</div>
  <h1>TA Job Finder</h1>
  <p>技术美术求职 — 今日新岗位速览</p>
  <div id="date-badge"></div>
</header>

<div class="main">

  <!-- 今日新岗位数量高亮条 -->
  <div class="today-bar" id="today-bar" style="display:none;">
    <div class="today-num" id="today-num">0</div>
    <div class="today-label">个新岗位<br><span id="today-region-label" style="font-size:0.75rem;opacity:0.8;">今日更新</span></div>
  </div>

  <!-- Overseas Section -->
  <div class="section-header">
    <div class="section-title">🌎 海外 / Overseas</div>
    <div class="section-count" id="overseas-count">— 个新岗位</div>
  </div>
  <div class="job-grid" id="overseas-grid"></div>
  <a href="overseas.html" class="all-link">查看全部海外岗位 →</a>

  <!-- Domestic Section -->
  <div class="section-header">
    <div class="section-title">🇨🇳 国内 / Domestic</div>
    <div class="section-count" id="domestic-count">— 个新岗位</div>
  </div>
  <div class="job-grid" id="domestic-grid"></div>
  <a href="boss.html" class="all-link">查看全部国内岗位 →</a>

  <!-- Mini Map -->
  <div class="mini-map-section">
    <div class="mini-map-label">📍 今日新岗位分布</div>
    <div id="mini-map"></div>
  </div>

</div>

<footer>
  TA Job Finder · 数据来源：LinkedIn / Boss 直聘 / 公司官网 · 仅供参考
</footer>

<script>
  // 显示日期
  var today = new Date();
  var dateStr = today.getFullYear() + ' 年 ' + (today.getMonth()+1) + ' 月 ' + today.getDate() + ' 日';
  document.getElementById('date-badge').textContent = dateStr;

  // 判断是否今日新岗位
  function isToday(dateStr) {
    if (!dateStr) return false;
    var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    return dateStr === todayStr;
  }

  // 生成卡片
  function makeCard(job, region) {
    var isNew = isToday(job.postedDate);
    var badges = [];
    if (job.type) {
      var typeClass = { 'Full-time': 'badge-fulltime', 'Contractor': 'badge-contractor', 'Intern': 'badge-intern' }[job.type] || 'badge-fulltime';
      badges.push('<span class="badge ' + typeClass + '">' + job.type + '</span>');
    }
    if (job.category) {
      var catClass = { 'aaa': 'badge-aaa', 'indie': 'badge-indie', 'intern': 'badge-intern', 'fang': 'badge-fang' }[job.category] || '';
      if (catClass) badges.push('<span class="badge ' + catClass + '">' + (job.category.toUpperCase ? job.category.toUpperCase() : job.category) + '</span>');
    }
    if (job.salary && job.salary !== '—') {
      badges.push('<span class="badge badge-salary">' + job.salary + '</span>');
    }

    var distance = job.distance ? '<span class="card-distance">距 ' + job.distance.label + ' ' + job.distance.text + '</span>' : '';
    var linkText = region === 'overseas' ? '查看岗位 →' : '查看岗位 →';
    var href = region === 'overseas' ? 'overseas.html' : 'boss.html';
    var regionLabel = region === 'overseas' ? '🌎 海外' : '🇨🇳 国内';

    return '<a href="' + href + '" class="job-card' + (isNew ? ' is-new' : '') + '">' +
      '<div class="card-top">' +
        '<span class="card-company">' + job.company + '</span>' +
        '<span class="card-area">' + regionLabel + '</span>' +
      '</div>' +
      '<div class="card-title">' + job.name + '</div>' +
      '<div class="card-badges">' + badges.join('') + '</div>' +
      '<div class="card-meta">' +
        (distance || '<span></span>') +
        '<span class="card-link">' + linkText + '</span>' +
      '</div>' +
    '</a>';
  }

  // 加载 overseas.html 的岗位数据
  Promise.all([
    fetch('overseas.html').then(r => r.text()),
    fetch('boss.html').then(r => r.text())
  ]).then(function(results) {
    var overseasText = results[0];
    var bossText = results[1];

    // 提取 overseas jobs
    var oMatch = overseasText.match(/const overseasJobs = \[([\s\S]*?)\];/);
    var bMatch = bossText.match(/const domesticJobs = \[([\s\S]*?)\];/);

    var overseasJobs = [];
    var domesticJobs = [];

    if (oMatch) {
      overseasJobs = eval('[' + oMatch[1] + ']');
    }
    if (bMatch) {
      domesticJobs = eval('[' + bMatch[1] + ']');
    }

    // 筛选今日新岗位
    var todayOverseas = overseasJobs.filter(function(j) { return isToday(j.postedDate); });
    var todayDomestic = domesticJobs.filter(function(j) { return isToday(j.postedDate); });

    // 渲染卡片
    var overseasGrid = document.getElementById('overseas-grid');
    var domesticGrid = document.getElementById('domestic-grid');

    if (todayOverseas.length > 0) {
      overseasGrid.innerHTML = todayOverseas.map(function(j) { return makeCard(j, 'overseas'); }).join('');
      document.getElementById('overseas-count').textContent = todayOverseas.length + ' 个新岗位';
    } else {
      overseasGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#bbb;padding:40px 0;font-size:0.9rem;">今日暂无新增海外岗位</div>';
      document.getElementById('overseas-count').textContent = '0 个新岗位';
    }

    if (todayDomestic.length > 0) {
      domesticGrid.innerHTML = todayDomestic.map(function(j) { return makeCard(j, 'domestic'); }).join('');
      document.getElementById('domestic-count').textContent = todayDomestic.length + ' 个新岗位';
    } else {
      domesticGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#bbb;padding:40px 0;font-size:0.9rem;">今日暂无新增国内岗位</div>';
      document.getElementById('domestic-count').textContent = '0 个新岗位';
    }

    // 今日新岗位统计
    var totalToday = todayOverseas.length + todayDomestic.length;
    var todayBar = document.getElementById('today-bar');
    if (totalToday > 0) {
      todayBar.style.display = 'flex';
      document.getElementById('today-num').textContent = totalToday;
      document.getElementById('today-region-label').textContent =
        (todayOverseas.length > 0 ? '海外 ' + todayOverseas.length + ' 个' : '') +
        (todayOverseas.length > 0 && todayDomestic.length > 0 ? ' · ' : '') +
        (todayDomestic.length > 0 ? '国内 ' + todayDomestic.length + ' 个' : '');
    }

    // 渲染小地图（今日新岗位）
    renderMiniMap(todayOverseas.concat(todayDomestic));
  }).catch(function(e) {
    console.error(e);
  });

  // 渲染迷你地图
  function renderMiniMap(jobs) {
    if (jobs.length === 0) return;

    var miniMap = L.map('mini-map', { zoomControl: true, dragging: true, scrollWheelZoom: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OSM', maxZoom: 18
    }).addTo(miniMap);

    var markers = jobs.map(function(j) {
      if (!j.lat || !j.lng) return null;
      var color = j.region === 'overseas' ? '#FF6B35' : '#34C759';
      var icon = L.divIcon({
        className: '',
        html: '<div style="width:14px;height:14px;background:' + color + ';border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px ' + color + '88;"></div>',
        iconSize: [14, 14], iconAnchor: [7, 7]
      });
      return L.marker([j.lat, j.lng], { icon: icon }).addTo(miniMap)
        .bindPopup('<b>' + j.company + '</b><br>' + j.name);
    }).filter(Boolean);

    if (markers.length > 0) {
      var group = L.featureGroup(markers);
      miniMap.fitBounds(group.getBounds().pad(0.2));
    }
  }
</script>
</body>
</html>
