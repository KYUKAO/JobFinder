    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #007AFF;
      --success: #34C759;
      --accent-warm: #FF9500;
      --bg: #F5F7FA;
      --card: #fff;
      --text: #1A1A2E;
      --text-secondary: #666;
      --border: #E8ECF0;
    }

    body {

      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #34C759, #30D158);
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(52,199,89,0.3);
      z-index: 10;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      gap: 16px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-back {
      background: rgba(255,255,255,0.2);
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .header-back:hover { background: rgba(255,255,255,0.3); }
    .header-title { font-size: 1.1rem; font-weight: 700; color: #fff; }
    .header-meta { font-size: 0.75rem; color: rgba(255,255,255,0.8); margin-top: 2px; }
    #new-badge {
      background: #fff;
      color: #34C759;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* Filter bar */
    .filter-bar {
      background: var(--card);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .filter-tab {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid transparent;
      background: var(--bg);
      color: var(--text-secondary);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-tab:hover { border-color: var(--primary); color: var(--primary); }
    .filter-tab.active { background: var(--success); color: #fff; border-color: var(--success); }
    .filter-tab.active.sh { background: #FF9500; border-color: #FF9500; }
    .filter-tab.active.bj { background: #007AFF; border-color: #007AFF; }
    .filter-tab.active.gz { background: #FF3B30; border-color: #FF3B30; }
    .filter-tab.active.hz { background: #5AC8FA; border-color: #5AC8FA; }
    .filter-tab.active.sz { background: #34C759; border-color: #34C759; }

    /* Main layout */
    .container {
      display: grid;
      grid-template-columns: 400px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      background: var(--card);
      overflow-y: auto;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 14px 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--card);
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .job-card {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .job-card:hover, .job-card.active { background: #F8FFF9; }
    .job-card.active { border-left: 3px solid var(--success); }

    .city-tag {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 6px;
      margin-bottom: 4px;
    }
    .city-sh { background: #FFF0E8; color: #FF9500; }
    .city-bj { background: #E8F0FF; color: #007AFF; }
    .city-gz { background: #FFE8E8; color: #FF3B30; }
    .city-hz { background: #E8F8FF; color: #5AC8FA; }
    .city-sz { background: #E8F9ED; color: #34C759; }

    .job-company {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--success);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 3px;
    }
    .job-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;

    .job-meta {

      flex-wrap: wrap;
      font-size: 0.72rem;
      color: var(--text-secondary);
      margin-bottom: 4px;

      border-radius: 20px;

      font-weight: 600;

    .badge-intern { background: #F3E8FF; color: #AF52DE; }
    .badge-new-grad { background: #E8F0FF; color: #007AFF; }
    .badge-salary { background: #FFF8E8; color: #FF9500; }

      font-size: 0.62rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 8px;

      margin-top: 8px;
      border-radius: 0 0 8px 8px;

      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: 8px;

    .jd-content {
      font-size: 0.8rem;
      color: var(--text);
      line-height: 1.7;

      color: #fff;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 20px;
      margin-top: 12px;

    }

    #map { width: 100%; height: 100%; }

      bottom: 24px;
      right: 16px;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.75rem;
      z-index: 1000;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      max-width: 180px;
    }
    .map-legend h4 {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      color: var(--text);
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; grid-template-rows: 260px 1fr; }
      .sidebar { order: 2; }
      .map-wrapper { order: 1; }
    }

    .sidebar::-webkit-scrollbar-track { background: var(--border); }
    .sidebar::-webkit-scrollbar-thumb { background: var(--success); border-radius: 4px; }
  </style>
</head>

}

function renderMarkers(visibleJobs) {
  Object.values(markerMap).forEach(function(m){ map.removeLayer(m); });
  markerMap = {};
  visibleJobs.forEach(function(j) {
    if (j.excluded) return;
    var color = getCityColor(j.cityCode);
    var isNew = isToday(j.postedDate);
    var m = L.marker([j.lat,j.lng],{icon:mkIcon(isNew?'#FF6B35':color, isNew?18:14, isNew)}).addTo(map);
    m.bindPopup(buildPopup(j));
    markerMap[j.id] = m;
  });
  if (visibleJobs.length > 0) {
    var bounds = L.latLngBounds(visibleJobs.filter(function(j){ return !j.excluded; }).map(function(j){ return [j.lat,j.lng]; }));
    map.fitBounds(bounds.pad(0.2), {maxZoom:8});
  }
}

function renderSidebar(visibleJobs) {
  var listEl = document.getElementById('job-list');
  document.getElementById('visible-count').textContent = visibleJobs.length + ' / ' + domesticJobs.length;
  listEl.innerHTML = '';
  visibleJobs.forEach(function(j) {
    if (j.excluded) return;
    var isNew = isToday(j.postedDate);
    var typeClass = j.type==='Intern'?'badge-intern':'badge-fulltime';
    var levelBadge = j.level==='实习'?'badge-intern':(j.level==='校招'||j.level==='校招/社招'?'badge-new-grad':'');
    var el = document.createElement('div');
    el.className = 'job-card';
    el.id = 'card-' + j.id;
    el.innerHTML =
      (isNew?'<span class="badge badge-new">🆕 今日新</span>':'') +
      '<span class="city-tag city-'+j.cityCode+'">'+j.city+'</span>' +
      '<div class="job-company">'+j.company+'</div>' +
      '<div class="job-title">'+j.name+'</div>' +
      '<div class="job-meta">' +
        '<span class="badge '+typeClass+'">'+j.type+'</span>' +
        (levelBadge?'<span class="badge '+levelBadge+'">'+j.level+'</span>':'') +
        (j.salary?'<span class="badge badge-salary">'+j.salary+'</span>':'') +
      '</div>' +
      '<div class="job-address">📍 '+j.address+'</div>' +
      '<div class="jd-section" id="jd-'+j.id+'">' +
        '<div class="jd-label">职位描述</div>' +
        '<div class="jd-content">'+j.jd+'</div>' +
        '<a href="'+j.url+'" target="_blank" class="jd-apply-btn">申请岗位 →</a>' +
      '</div>';
    el.addEventListener('click', function(e) { e.stopPropagation(); focusJob(j.id); });
    listEl.appendChild(el);
  });
}

function focusJob(id) {
  document.querySelectorAll('.job-card').forEach(function(c){ c.classList.remove('active'); });
  var card = document.getElementById('card-'+id);
  if (!card) return;
  card.classList.add('active');
  card.scrollIntoView({behavior:'smooth',block:'nearest'});

  // toggle JD
  var jdEl = document.getElementById('jd-'+id);
  if (jdEl) {
    var wasOpen = jdEl.classList.contains('open');
    document.querySelectorAll('.jd-section').forEach(function(el){ el.classList.remove('open'); });
    if (!wasOpen) jdEl.classList.add('open');
  }

  var job = domesticJobs.find(function(j){ return j.id===id; });
  if (job && markerMap[id]) {
    map.setView([job.lat,job.lng], 12, {animate:true});
    setTimeout(function(){ markerMap[id].openPopup(); }, 200);
  }
}

renderSidebar(domesticJobs);
renderMarkers(domesticJobs);

var currentFilter = 'all';
document.querySelectorAll('.filter-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.filter-tab').forEach(function(t){ t.classList.remove('active'); });
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    applyFilter();
  });
});

function applyFilter() {
  var sortBy = document.getElementById('sort-select').value;
  var visible = domesticJobs.filter(function(j) {
    if (j.excluded) return false;
    if (currentFilter === 'all') return true;
    return j.cityCode === currentFilter;
  });
  if (sortBy==='priority') visible.sort(function(a,b){return b.priority-a.priority;});
  else if (sortBy==='salary') visible.sort(function(a,b){
    var sa = parseFloat((a.salary||'0').match(/\d+/))||0, sb = parseFloat((b.salary||'0').match(/\d+/))||0;
    return sb-sa;
  });
  else if (sortBy==='new') visible.sort(function(a,b){return b.postedDate.localeCompare(a.postedDate);});
  renderSidebar(visible);
  renderMarkers(visible);
}
document.getElementById('sort-select').addEventListener('change', applyFilter);

var newCount = domesticJobs.filter(function(j){return !j.excluded && isToday(j.postedDate);}).length;
document.getElementById('new-badge').textContent = newCount + ' 个今日新岗位';
if (newCount===0) document.getElementById('new-badge').style.background='rgba(255,255,255,0.3)';
</script>
</body>
</html>
