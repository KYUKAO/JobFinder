<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TA Job Finder — 技术美术求职</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --card: #16161d;
      --card-hover: #1e1e28;
      --primary: #6366f1;
      --text: #f1f1f4;
      --text-muted: #71717a;
      --border: rgba(255,255,255,0.06);
      --intern: #22c55e;
      --entry: #06b6d4;
      --mid: #f59e0b;
      --senior: #a855f7;
      --lead: #ef4444;
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* ===== Top Nav ===== */
    .top-nav {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
      z-index: 20;
    }
    .nav-brand {
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      padding: 14px 16px 14px 0;
      margin-right: 8px;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-tabs {
      display: flex;
      gap: 2px;
      overflow-x: auto;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab {
      padding: 12px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .nav-tab .tab-count {
      font-size: 0.65rem;
      background: var(--border);
      padding: 2px 6px;
      border-radius: 10px;
      color: var(--text-muted);
    }
    .nav-tab.active .tab-count { background: rgba(99,102,241,0.2); color: var(--primary); }

    /* ===== Filter Bar ===== */
    .filter-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 8px 14px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      border: 1px solid transparent;
      background: none;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--border); color: var(--text); }
    .filter-btn.active { background: var(--primary); color: #fff; }

    /* ===== Main Layout ===== */
    .main {
      display: grid;
      grid-template-columns: 380px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .job-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .job-list::-webkit-scrollbar { width: 4px; }
    .job-list::-webkit-scrollbar-track { background: transparent; }
    .job-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .job-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .job-card:hover { border-color: var(--primary); background: var(--card-hover); }
    .job-card.focused { border-color: var(--primary); background: var(--card-hover); }

    .job-new {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .job-company { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 4px; }
    .job-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
    .job-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .badge-intern { background: rgba(34,197,94,0.15); color: var(--intern); }
    .badge-entry { background: rgba(6,182,212,0.15); color: var(--entry); }
    .badge-mid { background: rgba(245,158,11,0.15); color: var(--mid); }
    .badge-senior { background: rgba(168,85,247,0.15); color: var(--senior); }
    .badge-lead { background: rgba(239,68,68,0.15); color: var(--lead); }
    .badge-salary { background: rgba(99,102,241,0.12); color: #818cf8; }

    .job-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .job-deadline { font-weight: 600; }
    .job-deadline.ok { color: var(--intern); }
    .job-deadline.warn { color: var(--mid); }
    .job-deadline.urgent { color: var(--lead); animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .job-source {
      background: var(--border);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.65rem;
    }

    .jd-section { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .jd-section.open { display: block; }
    .jd-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--primary); margin-bottom: 6px; }
    .jd-content { font-size: 0.78rem; line-height: 1.7; color: var(--text-muted); max-height: 160px; overflow-y: auto; margin-bottom: 10px; }
    .apply-btn {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 20px;
      transition: background 0.15s;
    }
    .apply-btn:hover { background: #4f46e5; }

    /* Map */
    #map { flex: 1; min-height: 0; }
    .leaflet-popup-content-wrapper { border-radius: 12px; background: var(--card); color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 1px solid var(--border); }
    .leaflet-popup-tip { background: var(--card); }
    .leaflet-popup-content { margin: 12px 16px; font-family: inherit; }
    .popup-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
    .popup-company { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; }
    .popup-meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; }
    .popup-link { color: var(--primary); font-size: 0.8rem; font-weight: 600; }

    /* Portfolio/Tutorial Grid */
    .portfolio-grid {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      align-content: start;
    }
    .portfolio-grid::-webkit-scrollbar { width: 4px; }
    .portfolio-grid::-webkit-scrollbar-track { background: transparent; }
    .portfolio-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .video-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: all 0.15s;
    }
    .video-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.1); }
    .video-thumb { position: relative; padding-top: 56.25%; background: #000; }
    .video-thumb iframe, .video-thumb .thumb-placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .thumb-placeholder { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; font-size: 2rem; }
    .video-info { padding: 14px; }
    .video-title { font-size: 0.88rem; font-weight: 700; margin-bottom: 6px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .video-meta { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 6px; }
    .video-author { font-weight: 600; color: var(--primary); }
    .video-tag { display: inline-block; background: rgba(99,102,241,0.12); color: var(--primary); font-size: 0.68rem; padding: 3px 8px; border-radius: 10px; margin-top: 8px; }

    /* Mobile */
    @media (max-width: 768px) {
      body { height: auto; overflow: auto; }
      .main { grid-template-columns: 1fr; }
      #map { height: 280px; order: -1; }
      .sidebar { height: auto; max-height: 60vh; }
      .job-list { max-height: 50vh; }
      .portfolio-grid { grid-template-columns: 1fr; }
      .filter-bar { padding: 0 12px; }
      .nav-brand { padding: 12px 12px 12px 0; }
    }
  </style>
</head>
<body>

<!-- Top Navigation -->
<nav class="top-nav">
  <div class="nav-brand">TA Job Finder</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-page="domestic">
      🇨🇳 国内岗位
      <span class="tab-count" id="count-domestic">—</span>
    </button>
    <button class="nav-tab" data-page="overseas">
      🌎 海外岗位
      <span class="tab-count" id="count-overseas">—</span>
    </button>
    <button class="nav-tab" data-page="portfolios">
      🎬 作品集
      <span class="tab-count" id="count-portfolios">—</span>
    </button>
    <button class="nav-tab" data-page="tutorials">
      📚 优质教程
      <span class="tab-count" id="count-tutorials">—</span>
    </button>
    <button class="nav-tab" data-page="resumes">
      📝 简历参考
      <span class="tab-count" id="count-resumes">—</span>
    </button>
  </div>
</nav>

<!-- Filter Bar (job pages only) -->
<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="intern">实习</button>
  <button class="filter-btn" data-filter="entry">1年以下</button>
  <button class="filter-btn" data-filter="mid">1-3年</button>
  <button class="filter-btn" data-filter="senior">3-5年</button>
</div>

<!-- Main Content -->
<div class="main" id="main-content">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header" id="sidebar-header">加载中...</div>
    <div class="job-list" id="job-list"></div>
  </div>

  <!-- Right Panel: Map or Portfolio Grid -->
  <div id="right-panel">
    <div id="map"></div>
  </div>
</div>

<script>
// ===== State =====
var currentPage = 'domestic';
var currentFilter = 'all';

var domesticJobs = [];
var overseasJobs = [];
var portfolios = [];
var tutorials = [];
var resumes = [];

var today = new Date();
var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

// ===== Map =====
var map = L.map('map', {zoomControl:true, scrollWheelZoom:true}).setView([31.2304, 121.4737], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'&copy; OSM', maxZoom:19}).addTo(map);
var markerMap = {};

var levelColor = {'intern':'#22c55e','entry':'#06b6d4','mid':'#f59e0b','senior':'#a855f7','lead':'#ef4444'};

function mkIcon(color, sz) {
  return L.divIcon({className:'', html:'<div style="width:'+sz+'px;height:'+sz+'px;background:'+color+';border:2px solid rgba(255,255,255,0.8);border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.3);"></div>', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]});
}

// ===== Domestic city coords =====
var cityCoords = {
  '深圳': [22.5431, 114.0579], '广州': [23.1291, 113.2644], '上海': [31.2304, 121.4737],
  '北京': [39.9042, 116.4074], '杭州': [30.2741, 120.1536], '成都': [30.5728, 104.0668],
  '武汉': [30.5928, 114.3055], '苏州': [31.2989, 120.5853], '珠海': [22.2710, 113.5767],
  '福州': [26.0745, 119.2965], '南京': [32.0603, 118.7969], '西安': [34.3416, 108.9398],
};
function getDomesticCoords(city) {
  var c = cityCoords[city] || [31.2304, 121.4737];
  return [c[0] + (Math.random()-0.5)*0.04, c[1] + (Math.random()-0.5)*0.04];
}

// ===== Helpers =====
function getFiltered() {
  var jobs = currentPage === 'domestic' ? domesticJobs : overseasJobs;
  if (currentFilter === 'all') return jobs;
  return jobs.filter(function(j){ return j.level === currentFilter; });
}

function getDeadlineClass(days) {
  if (days <= 3) return 'urgent';
  if (days <= 7) return 'warn';
  return 'ok';
}

function getDeadlineText(days, isOverseas) {
  if (days <= 0) return isOverseas ? 'Closed' : '已截止';
  if (days === 1) return isOverseas ? '1 day left' : '明天截止';
  if (days <= 7) return isOverseas ? days + ' days left' : '剩' + days + '天';
  return isOverseas ? days + ' days' : days + '天';
}

function getLevelBadge(level, isOverseas) {
  var map = isOverseas
    ? {intern:'Intern', entry:'Entry', mid:'Mid', senior:'Senior', lead:'Lead'}
    : {intern:'实习', entry:'1年以下', mid:'1-3年', senior:'3-5年', lead:'5年+'};
  var cls = {intern:'badge-intern', entry:'badge-entry', mid:'badge-mid', senior:'badge-senior', lead:'badge-lead'};
  return '<span class="badge ' + (cls[level]||'') + '">' + (map[level]||level) + '</span>';
}

// ===== Render job list =====
function renderList(jobs) {
  var isOverseas = currentPage === 'overseas';
  var total = (isOverseas ? overseasJobs : domesticJobs).length;
  var filtered = jobs.length;
  document.getElementById('sidebar-header').innerHTML =
    '显示 <strong>' + filtered + '</strong> / ' + total + ' 个岗位';

  var list = document.getElementById('job-list');
  list.innerHTML = '';

  if (jobs.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:0.85rem;">没有符合条件的岗位</div>';
    return;
  }

  var sorted = jobs.slice().sort(function(a,b){
    var order = {intern:0, entry:1, mid:2, senior:3, lead:4};
    return (order[a.level]||5) - (order[b.level]||5);
  });

  sorted.forEach(function(j) {
    var isNew = j.postedDate === todayStr;
    var dlClass = getDeadlineClass(j.daysLeft);
    var dlText = getDeadlineText(j.daysLeft, isOverseas);
    var hasJd = j.jd && j.jd.length > 10;
    var location = isOverseas ? j.address : (j.city || '');

    var el = document.createElement('div');
    el.className = 'job-card';
    el.id = 'card-' + j.id;
    el.innerHTML =
      (isNew ? '<span class="job-new">NEW</span>' : '') +
      '<div class="job-company">' + j.company + (location ? ' · ' + location : '') + '</div>' +
      '<div class="job-title">' + j.name + '</div>' +
      '<div class="job-badges">' +
        getLevelBadge(j.level, isOverseas) +
        '<span class="badge badge-salary">' + (j.taSubLabel||'') + '</span>' +
      '</div>' +
      '<div class="job-footer">' +
        '<span class="job-deadline ' + dlClass + '">⏰ ' + dlText + '</span>' +
        '<span class="job-source">' + j.source + '</span>' +
      '</div>' +
      (hasJd ? '<div class="jd-section" id="jd-' + j.id + '">' +
        '<div class="jd-label">' + (isOverseas ? 'JD & Requirements' : '岗位职责 & 要求') + '</div>' +
        '<div class="jd-content">' + j.jd.replace(/\n/g, '<br>') + '</div>' +
        '<a href="' + j.url + '" target="_blank" class="apply-btn">' + (isOverseas ? 'Apply →' : '申请岗位 →') + '</a>' +
       '</div>' : '<a href="' + j.url + '" target="_blank" class="apply-btn" style="display:inline-block;margin-top:8px;">' + (isOverseas ? 'Apply →' : '申请岗位 →') + '</a>');

    el.addEventListener('click', function(e) {
      if (hasJd) {
        var jdEl = document.getElementById('jd-' + j.id);
        if (jdEl) { jdEl.classList.toggle('open'); e.stopPropagation(); }
      }
      focusJob(j.id);
    });
    list.appendChild(el);
  });
}

// ===== Render map markers =====
function renderMarkers(jobs) {
  Object.values(markerMap).forEach(function(m){ map.removeLayer(m); });
  markerMap = {};

  jobs.forEach(function(j) {
    var lat, lng;
    if (currentPage === 'domestic') {
      var c = getDomesticCoords(j.city || '上海');
      lat = c[0]; lng = c[1];
    } else {
      lat = j.lat; lng = j.lng;
      if (!lat || !lng) return;
    }

    var isOverseas = currentPage === 'overseas';
    var sz = j.level === 'intern' ? 8 : j.level === 'senior' || j.level === 'lead' ? 14 : 11;
    var location = isOverseas ? j.address : (j.city || '');
    var applyText = isOverseas ? 'Apply →' : '申请岗位 →';
    var popup = '<div class="popup-title">' + j.name + '</div>' +
      '<div class="popup-company">' + j.company + (location ? ' · ' + location : '') + '</div>' +
      '<div class="popup-meta">' + getLevelBadge(j.level, isOverseas) + ' ' + (j.salary && j.salary !== '—' ? '<span style="color:#818cf8;">'+j.salary+'</span>' : '') + '</div>' +
      '<a href="' + j.url + '" target="_blank" class="popup-link">' + applyText + '</a>';

    var m = L.marker([lat, lng], {icon: mkIcon(levelColor[j.level]||'#6366f1', sz)}).addTo(map);
    m.bindPopup(popup);
    m.on('click', function(){ focusJob(j.id); });
    markerMap[j.id] = m;
  });

  // Fit bounds
  if (jobs.length > 0) {
    var lats = jobs.map(function(j){
      return currentPage === 'domestic' ? getDomesticCoords(j.city||'上海')[0] : j.lat;
    }).filter(Boolean);
    var lngs = jobs.map(function(j){
      return currentPage === 'domestic' ? getDomesticCoords(j.city||'上海')[1] : j.lng;
    }).filter(Boolean);
    if (lats.length > 0) {
      map.fitBounds([[Math.min.apply(null,lats), Math.min.apply(null,lngs)], [Math.max.apply(null,lats), Math.max.apply(null,lngs)]], {padding:[30,30]});
    }
  }
}

function focusJob(id) {
  document.querySelectorAll('.job-card').forEach(function(c){ c.classList.remove('focused'); });
  var card = document.getElementById('card-' + id);
  if(card) { card.classList.add('focused'); card.scrollIntoView({behavior:'smooth', block:'nearest'}); }
  var m = markerMap[id];
  if(m) { m.openPopup(); }
}

// ===== Render portfolio/tutorial grid =====
function renderPortfolioGrid(items, type) {
  var panel = document.getElementById('right-panel');
  var list = document.getElementById('job-list');
  var typeLabel = type === 'portfolios' ? '作品集' : type === 'tutorials' ? '教程' : '项目';
  panel.innerHTML = '<div class="portfolio-grid" id="portfolio-grid"></div>';
  list.innerHTML = '';
  document.getElementById('sidebar-header').innerHTML = '共 <strong>' + items.length + '</strong> 个' + typeLabel;

  var grid = document.getElementById('portfolio-grid');
  if (items.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted);font-size:0.9rem;">暂无数据</div>';
    return;
  }

  grid.innerHTML = items.map(function(p) {
    var isBilibili = p.platform === 'bilibili';
    var platformIcon = isBilibili ? '📺' : '▶️';
    var embedUrl = isBilibili
      ? 'https://player.bilibili.com/player.html?bvid=' + p.bvid + '&autoplay=0'
      : (p.videoId ? 'https://www.youtube.com/embed/' + p.videoId + '?rel=0' : '');

    return '<div class="video-card">' +
      '<div class="video-thumb">' +
        (embedUrl
          ? '<iframe src="' + embedUrl + '" allowfullscreen loading="lazy"></iframe>'
          : '<div class="thumb-placeholder">' + platformIcon + '</div>') +
      '</div>' +
      '<div class="video-info">' +
        '<div class="video-title">' + p.title + '</div>' +
        '<div class="video-meta"><span class="video-author">' + p.author + '</span></div>' +
        '<div class="video-meta" style="color:#71717a;">' +
          (p.views ? '▶ ' + p.views + ' | ' : '') +
          '<span style="color:' + (isBilibili ? '#FB7299' : '#FF0000') + ';">' + (isBilibili ? 'B站' : 'YouTube') + '</span>' +
        '</div>' +
        '<a href="' + p.url + '" target="_blank" class="video-tag">查看完整视频 →</a>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ===== Render resume grid =====
function renderResumeGrid() {
  var panel = document.getElementById('right-panel');
  var list = document.getElementById('job-list');
  panel.innerHTML = '<div id="resume-grid" style="flex:1;overflow-y:auto;padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;align-content:start;"></div>';
  list.innerHTML = '';
  document.getElementById('sidebar-header').innerHTML = '共 <strong>' + resumes.length + '</strong> 条 LinkedIn 公开简历';

  var grid = document.getElementById('resume-grid');
  if (resumes.length === 0 || (resumes.length === 1 && resumes[0].profile_id === 'placeholder')) {
    grid.style.gridTemplateColumns = '1fr';
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted);font-size:0.9rem;">暂无简历数据 · 运行 updater.py 爬取 LinkedIn 数据</div>';
    return;
  }

  grid.innerHTML = resumes.map(function(r) {
    var skills = r.skills || [];
    var skillHtml = skills.length > 0
      ? skills.map(function(s){ return '<span style="font-size:0.68rem;font-weight:600;padding:3px 8px;border-radius:10px;background:var(--bg);color:var(--text-muted);border:1px solid var(--border);">' + s + '</span>'; }).join('')
      : '<span style="font-size:0.72rem;color:var(--text-muted);">—</span>';

    return '<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;border-left:3px solid var(--primary);transition:all 0.15s;">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;">' +
        '<span style="font-size:0.95rem;font-weight:700;">' + (r.name || '匿名') + '</span>' +
        '<span style="font-size:0.65rem;font-weight:700;padding:3px 8px;border-radius:10px;background:rgba(99,102,241,0.15);color:var(--primary);white-space:nowrap;">LinkedIn</span>' +
      '</div>' +
      '<div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:4px;">' + (r.title || '—') + '</div>' +
      '<div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:12px;display:flex;align-items:center;gap:4px;">📍 ' + (r.location || '—') + '</div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;">' + skillHtml + '</div>' +
      '<div style="border-top:1px solid var(--border);padding-top:10px;display:flex;justify-content:space-between;align-items:center;">' +
        '<span style="font-size:0.68rem;color:var(--text-muted);">抓取于 ' + (r.scraped_date || '') + '</span>' +
        '<a href="' + (r.profile_url || '#') + '" target="_blank" style="font-size:0.72rem;font-weight:600;color:var(--primary);padding:4px 10px;border-radius:20px;border:1px solid var(--primary);transition:all 0.15s;">查看主页 →</a>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ===== Switch page =====
function switchPage(page) {
  currentPage = page;

  // Update nav tabs
  document.querySelectorAll('.nav-tab').forEach(function(t){
    t.classList.toggle('active', t.dataset.page === page);
  });

  // Show/hide filter bar
  var filterBar = document.getElementById('filter-bar');
  var isJobPage = (page === 'domestic' || page === 'overseas');
  filterBar.style.display = isJobPage ? 'flex' : 'none';

  // Show/hide sidebar+map
  var sidebar = document.getElementById('sidebar');
  var panel = document.getElementById('right-panel');
  sidebar.style.display = isJobPage ? 'flex' : 'none';
  panel.innerHTML = '';

  if (isJobPage) {
    panel.innerHTML = '<div id="map"></div>';
    map = L.map('map', {zoomControl:true, scrollWheelZoom:true}).setView([31.2304, 121.4737], 4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'&copy; OSM', maxZoom:19}).addTo(map);

    if (page === 'overseas') {
      map.setView([39.0, -98.0], 4);
    }

    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');

    var jobs = getFiltered();
    renderList(jobs);
    renderMarkers(jobs);
  } else if (page === 'portfolios') {
    renderPortfolioGrid(portfolios, 'portfolios');
  } else if (page === 'tutorials') {
    renderPortfolioGrid(tutorials, 'tutorials');
  } else if (page === 'resumes') {
    renderResumeGrid();
  }
}

// ===== Nav tab events =====
document.querySelectorAll('.nav-tab').forEach(function(btn){
  btn.addEventListener('click', function(){
    switchPage(btn.dataset.page);
  });
});

// ===== Filter events =====
document.querySelectorAll('.filter-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    var filtered = getFiltered();
    renderList(filtered);
    renderMarkers(filtered);
  });
});

// ===== Load all data =====
Promise.all([
  fetch('data/jobs-domestic.json').then(function(r){ return r.json().catch(function(){ return {}; }); }),
  fetch('data/jobs-overseas.json').then(function(r){ return r.json().catch(function(){ return {}; }); }),
  fetch('data/portfolios.json').then(function(r){ return r.json().catch(function(){ return {}; }); }),
  fetch('data/resumes.json').then(function(r){ return r.json().catch(function(){ return {}; }); }),
]).then(function(results) {
  var dom = results[0];
  var over = results[1];
  var ports = results[2];
  var res = results[3];

  domesticJobs = (dom.domesticJobs||[]).filter(function(j){ return !j.excluded; });
  overseasJobs = (over.overseasJobs||[]).filter(function(j){ return !j.excluded; });
  portfolios = ports.portfolios||[];
  tutorials = ports.tutorials||[];
  resumes = res.resumes||[];

  // Update nav counts
  document.getElementById('count-domestic').textContent = domesticJobs.length;
  document.getElementById('count-overseas').textContent = overseasJobs.length;
  document.getElementById('count-portfolios').textContent = portfolios.length;
  document.getElementById('count-tutorials').textContent = tutorials.length;
  document.getElementById('count-resumes').textContent = resumes.length;

  // Render default page (domestic)
  var filtered = getFiltered();
  renderList(filtered);
  renderMarkers(filtered);

}).catch(function(e){
  console.error('Data load error:', e);
});
</script>
</body>
</html>
