<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TA Job Finder — 技术美术求职地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #007AFF;
      --accent: #FF6B35;
      --accent-warm: #FF9500;
      --success: #34C759;
      --purple: #AF52DE;
      --bg: #F5F7FA;
      --card: #fff;
      --text: #1A1A2E;
      --text-secondary: #666;
      --border: #E8ECF0;
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ========== Header ========== */
    header {
      background: linear-gradient(135deg, #007AFF 0%, #5AC8FA 100%);
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0,122,255,0.25);
      z-index: 10;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      gap: 16px;
    }
    .header-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: #fff;
    }
    .header-sub {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.8);
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .date-badge {
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .stat-pills {
      display: flex;
      gap: 8px;
    }
    .stat-pill {
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .stat-pill.overseas { background: rgba(255,107,53,0.3); }
    .stat-pill.domestic { background: rgba(52,199,89,0.3); }

    /* ========== Filter bar ========== */
    .filter-bar {
      background: var(--card);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .filter-group-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-right: 4px;
    }
    .filter-tab {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid transparent;
      background: var(--bg);
      color: var(--text-secondary);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-tab:hover { border-color: var(--primary); color: var(--primary); }
    .filter-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .filter-tab.active.overseas { background: var(--accent); border-color: var(--accent); }
    .filter-tab.active.domestic { background: var(--success); border-color: var(--success); }
    .filter-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

    /* ========== Main layout ========== */
    .main {
      display: grid;
      grid-template-columns: 420px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ========== Sidebar (today's new jobs) ========== */
    .sidebar {
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--card);
      z-index: 10;
      flex-shrink: 0;
    }
    .sidebar-header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .sidebar-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
    }
    .sidebar-count {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
    }
    .sidebar-desc {
      font-size: 0.72rem;
      color: #999;
      line-height: 1.4;
    }
    .job-list {
      overflow-y: auto;
      flex: 1;
    }

    /* ========== Job cards ========== */
    .job-card {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }
    .job-card:hover { background: #F8F9FF; }
    .job-card.active { background: #F0F7FF; border-left: 3px solid var(--primary); }
    .job-card.is-new { background: #FFF8F5; }
    .job-card.is-new.active { background: #FFF0EB; border-left-color: var(--accent); }
    .job-card.active.is-new { border-left-color: var(--accent); }

    .card-region-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .tag-overseas { background: #FFF0EB; color: var(--accent); }
    .tag-domestic { background: #E8F9ED; color: var(--success); }

    .card-company {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 3px;
    }
    .card-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.35;
    }
    .card-badges {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 600;
    }
    .badge-fulltime { background: #E8F4FF; color: var(--primary); }
    .badge-intern { background: #F3E8FF; color: var(--purple); }
    .badge-new-grad { background: #E8F0FF; color: var(--primary); }
    .badge-salary { background: #FFF8E8; color: var(--accent-warm); }
    .badge-aaa { background: #FFF0EB; color: var(--accent); }
    .badge-fang { background: #E8F9FD; color: #00B4D8; }
    .badge-new {
      background: var(--accent);
      color: #fff;
      position: absolute;
      top: 10px; right: 12px;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 8px;
    }
    .card-meta {
      font-size: 0.72rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .card-meta strong { color: var(--text); }

    /* JD expand */
    .jd-section {
      background: #FAFAFA;
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      margin-top: 8px;
      border-radius: 0 0 8px 8px;
      display: none;
    }
    .jd-section.open { display: block; }
    .jd-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .jd-content {
      font-size: 0.78rem;
      color: var(--text);
      line-height: 1.65;
      max-height: 200px;
      overflow-y: auto;
    }
    .jd-apply-btn {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .jd-apply-btn:hover { background: #0066CC; }

    /* ========== Map ========== */
    .map-wrapper { position: relative; }
    #map { width: 100%; height: 100%; }

    /* Map overlay: job count chip */
    .map-stats-chip {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.75rem;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .map-stats-chip .chip-num {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }
    .map-stats-chip .chip-label {
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .map-stats-chip .chip-num.overseas { color: var(--accent); }
    .map-stats-chip .chip-num.domestic { color: var(--success); }

    /* Map overlay: legend */
    .map-legend {
      position: absolute;
      bottom: 20px;
      left: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.73rem;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .map-legend h4 {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      color: var(--text);
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Map overlay: all jobs list */
    .map-all-jobs-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      width: 240px;
      max-height: calc(100% - 80px);
      overflow-y: auto;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .map-panel-title {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .map-job-item {
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
      margin-bottom: 4px;
    }
    .map-job-item:hover { background: #F0F7FF; }
    .map-job-item.active { background: #E8F0FF; border: 1px solid var(--primary); }
    .map-job-item .mji-company { font-size: 0.68rem; font-weight: 700; color: var(--text-secondary); }
    .map-job-item .mji-title { font-size: 0.72rem; color: var(--text); font-weight: 500; }
    .map-job-item .mji-meta { font-size: 0.65rem; color: #999; margin-top: 2px; }

    /* ========== Responsive ========== */
    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; grid-template-rows: 260px 1fr; }
      .sidebar { order: 2; }
      .map-wrapper { order: 1; }
      .map-all-jobs-panel { display: none; }
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: var(--border); }
    .sidebar::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
    .map-all-jobs-panel::-webkit-scrollbar { width: 3px; }
    .map-all-jobs-panel::-webkit-scrollbar-track { background: var(--border); }
    .map-all-jobs-panel::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
  </style>
</head>

</div>

// ================================================================
// 初始化
// ================================================================
var today = new Date();
var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
document.getElementById('date-badge').textContent = today.getFullYear() + '年' + (today.getMonth()+1) + '月' + today.getDate() + '日';

function isToday(d) { return d === todayStr; }

// 颜色
function getMarkerColor(job) {
  if (isToday(job.postedDate)) return '#FF6B35'; // 今日新用橙色
  if (job.region === 'overseas') {
    return { aaa:'#FF6B35', indie:'#FF9500', fang:'#00B4D8' }[job.category] || '#FF6B35';
  }
  return { sh:'#FF9500', bj:'#007AFF', gz:'#FF3B30', hz:'#5AC8FA', sz:'#34C759', wh:'#FF9500' }[job.cityCode] || '#34C759';
}

function getRegionColor(region) {
  return region === 'overseas' ? '#FF6B35' : '#34C759';
}

// 图标
function mkIcon(color, sz, isNew) {
  sz = sz || 14;
  var glow = isNew ? 'box-shadow:0 0 10px ' + color + ';' : '';
  return L.divIcon({ className:'', html:'<div style="width:'+sz+'px;height:'+sz+'px;background:'+color+';border:'+(isNew?'3px':'2.5px')+' solid #fff;border-radius:50%;'+glow+'"></div>', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2] });
}

// ================================================================
// 地图
// ================================================================
var map = L.map('map', { zoomControl:true, scrollWheelZoom:true }).setView([30.5, 120.0], 5);

// OSM for overseas
var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OSM', maxZoom: 18
});

// Gaode for China domestic
var gaodeLayer = L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
  subdomains: '1234',
  attribution: '© 高德地图',
  maxZoom: 18
});

osmLayer.addTo(map);
gaodeLayer.addTo(map);

// U of U marker
L.marker(UOU, {icon: mkIcon('#e94560', 22)})
  .addTo(map)
  .bindPopup('<b style="color:#e94560">University of Utah</b><br><small>当前位置 · 201 Presidents Cir</small>');

var markerMap = {};

// 绘制连接线
function drawLines(jobs) {
  jobs.forEach(function(j) {
    if (j.excluded || !j.lat || !j.lng) return;
    if (j.region !== 'overseas') return;
    var isNew = isToday(j.postedDate);
    L.polyline([UOU, [j.lat, j.lng]], {
      color: isNew ? '#FF6B35' : '#FF6B35',
      weight: isNew ? 2 : 1,
      opacity: isNew ? 0.6 : 0.25,
      dashArray: isNew ? null : '6, 8'
    }).addTo(map);
  });
}

function renderMarkers(visibleJobs) {
  Object.values(markerMap).forEach(function(m){ map.removeLayer(m); });
  markerMap = {};
  visibleJobs.forEach(function(j) {
    if (j.excluded || !j.lat || !j.lng) return;
    var color = getMarkerColor(j);
    var isNew = isToday(j.postedDate);
    var m = L.marker([j.lat, j.lng], {icon: mkIcon(color, isNew?18:14, isNew)}).addTo(map);
    m.bindPopup(buildPopup(j));
    markerMap[j.id] = m;
  });
  drawLines(visibleJobs.filter(function(j){ return j.region==='overseas'; }));
  document.getElementById('total-visible').textContent = visibleJobs.filter(function(j){return !j.excluded;}).length;
}

function buildPopup(j) {
  var isNew = isToday(j.postedDate);
  var regionTag = j.region==='overseas'?'🌎 海外':'🇨🇳 '+j.city;
  var newTag = isNew ? '<span style="background:#FF6B35;color:#fff;padding:2px 8px;border-radius:8px;font-size:0.75rem;font-weight:700;margin-bottom:6px;display:inline-block;">🆕 今日新</span><br><br>' : '';
  var distLine = j.region==='overseas' && j.distance ? '<b>📍 距 U of U：</b>'+j.distance+'<br>' : '';
  var cityLine = j.region==='domestic' && j.city ? '<b>📍 城市：</b>'+j.city+'<br>' : '';
  return '<b style="color:'+getMarkerColor(j)+'">['+regionTag+'] '+j.company+'</b><br>' +
    '<b>'+j.name+'</b><br><small>'+j.address+'</small><br><br>' +
    newTag +
    distLine +
    cityLine +
    (j.salary&&j.salary!=='—'?'<b>💰 薪资：</b>'+j.salary+'<br>':'') +
    '<b>🏷 类型：</b>'+j.type+'<br>' +
    '<b>⭐ 优先级：</b>'+('⭐'.repeat(j.priority))+'<br><br>' +
    '<a href="'+j.url+'" target="_blank" style="color:#007AFF;font-size:0.85em;">🔗 查看职位 →</a>';
}

// ================================================================
// 侧边栏：今日新岗位
// ================================================================
function renderTodaySidebar() {
  var todayJobs = allJobs.filter(function(j){ return !j.excluded && isToday(j.postedDate); });
  document.getElementById('today-count').textContent = todayJobs.length + ' 个';
  document.getElementById('stat-overseas').textContent = '🌎 ' + allJobs.filter(function(j){return !j.excluded && j.region==='overseas';}).length;
  document.getElementById('stat-domestic').textContent = '🇨🇳 ' + allJobs.filter(function(j){return !j.excluded && j.region==='domestic';}).length;

  var listEl = document.getElementById('today-job-list');
  listEl.innerHTML = '';

  if (todayJobs.length === 0) {
    listEl.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#bbb;font-size:0.85rem;">今日暂无新岗位<br><small style="color:#ccc;margin-top:6px;display:block;">明天再来看看~</small></div>';
    return;
  }

  // 按优先级排序
  todayJobs.sort(function(a,b){ return b.priority - a.priority; });

  todayJobs.forEach(function(j) {
    var regionTagClass = j.region === 'overseas' ? 'tag-overseas' : 'tag-domestic';
    var regionTagText = j.region === 'overseas' ? '🌎 海外' : '🇨🇳 ' + j.city;
    var typeClass = j.type==='Intern'?'badge-intern':'badge-fulltime';
    var levelBadge = j.level && j.level!=='1-3年' ? '<span class="badge badge-new-grad">'+j.level+'</span>' : '';
    var salaryBadge = j.salary && j.salary!=='—' ? '<span class="badge badge-salary">'+j.salary+'</span>' : '';
    var distInfo = j.region==='overseas' && j.distance ? '📍 '+j.distance : '';
    var cityInfo = j.region==='domestic' && j.city ? '📍 '+j.city : '';
    var metaText = distInfo || cityInfo;

    var el = document.createElement('div');
    el.className = 'job-card is-new';
    el.id = 'today-card-' + j.id;
    el.innerHTML =
      '<span class="badge badge-new">🆕 今日新</span>' +
      '<span class="card-region-tag ' + regionTagClass + '">' + regionTagText + '</span>' +
      '<div class="card-company">' + j.company + '</div>' +
      '<div class="card-title">' + j.name + '</div>' +
      '<div class="card-badges">' +
        '<span class="badge ' + typeClass + '">' + j.type + '</span>' +
        levelBadge +
        salaryBadge +
      '</div>' +
      (metaText ? '<div class="card-meta">' + metaText + '</div>' : '') +
      '<div class="jd-section" id="today-jd-' + j.id + '">' +
        '<div class="jd-label">' + (j.region==='overseas'?'Job Description':'职位描述') + '</div>' +
        '<div class="jd-content">' + j.jd.replace(/\n/g, '<br>') + '</div>' +
        '<a href="' + j.url + '" target="_blank" class="jd-apply-btn">申请岗位 →</a>' +
      '</div>';
    el.addEventListener('click', function(e) { e.stopPropagation(); focusJob(j.id); });
    listEl.appendChild(el);
  });
}

// ================================================================
// 地图上的岗位列表（右上角）
// ================================================================
function renderAllJobsPanel(visibleJobs) {
  var panelEl = document.getElementById('all-jobs-list');
  panelEl.innerHTML = '';

  var overseasJobs = visibleJobs.filter(function(j){ return j.region==='overseas' && !j.excluded; });
  var domesticJobs = visibleJobs.filter(function(j){ return j.region==='domestic' && !j.excluded; });

  function addGroup(jobs, label, color) {
    if (jobs.length === 0) return;
    var groupDiv = document.createElement('div');
    groupDiv.style.marginTop = '8px';
    var header = document.createElement('div');
    header.style.fontSize = '0.62rem';
    header.style.fontWeight = '700';
    header.style.textTransform = 'uppercase';
    header.style.letterSpacing = '0.08em';
    header.style.color = color;
    header.style.padding = '4px 0 4px';
    header.textContent = label + ' (' + jobs.length + ')';
    groupDiv.appendChild(header);
    jobs.forEach(function(j) {
      var isNew = isToday(j.postedDate);
      var item = document.createElement('div');
      item.className = 'map-job-item';
      item.id = 'panel-item-' + j.id;
      item.style.borderLeft = isNew ? '3px solid #FF6B35' : ('3px solid ' + color);
      item.innerHTML =
        '<div class="mji-company">' + j.company + (isNew?' · 🆕':'') + '</div>' +
        '<div class="mji-title">' + j.name + '</div>' +
        '<div class="mji-meta">' + (j.region==='overseas'?(j.distance||''):(j.city||'')) + (j.salary&&j.salary!=='—'?' · '+j.salary:'') + '</div>';
      item.addEventListener('click', function() { focusJob(j.id); });
      groupDiv.appendChild(item);
    });
    panelEl.appendChild(groupDiv);
  }

  addGroup(overseasJobs, '🌎 海外', '#FF6B35');
  addGroup(domesticJobs, '🇨🇳 国内', '#34C759');
}

// ================================================================
// Focus 逻辑
// ================================================================
function focusJob(id) {
  // 清除侧边栏高亮
  document.querySelectorAll('.job-card').forEach(function(c){ c.classList.remove('active'); });
  document.querySelectorAll('.map-job-item').forEach(function(c){ c.classList.remove('active'); });

  var card = document.getElementById('today-card-' + id);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({behavior:'smooth',block:'nearest'});
    // toggle JD
    var jdEl = document.getElementById('today-jd-' + id);
    if (jdEl) {
      var wasOpen = jdEl.classList.contains('open');
      document.querySelectorAll('.jd-section').forEach(function(el){ el.classList.remove('open'); });
      if (!wasOpen) jdEl.classList.add('open');
    }
  }

  var panelItem = document.getElementById('panel-item-' + id);
  if (panelItem) {
    panelItem.classList.add('active');
    panelItem.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  // 地图定位
  var job = allJobs.find(function(j){ return j.id===id; });
  if (job && markerMap[id]) {
    var zoom = job.region === 'overseas' ? 11 : 8;
    map.setView([job.lat, job.lng], zoom, {animate:true});
    setTimeout(function(){ markerMap[id].openPopup(); }, 200);
  }
}

// ================================================================
// 过滤
// ================================================================
var currentRegion = 'all';
var currentType = 'all';
var currentPriority = false;

document.querySelectorAll('.filter-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    var filter = tab.dataset.filter;
    if (['all','overseas','domestic'].indexOf(filter) >= 0) {
      document.querySelectorAll('.filter-tab[data-filter]').forEach(function(t){
        if (['all','overseas','domestic'].indexOf(t.dataset.filter) >= 0) t.classList.remove('active');
      });
      tab.classList.add('active');
      currentRegion = filter;
    } else if (['fulltime','intern','contractor'].indexOf(filter) >= 0) {
      document.querySelectorAll('.filter-tab[data-filter]').forEach(function(t){
        if (['fulltime','intern','contractor'].indexOf(t.dataset.filter) >= 0) t.classList.remove('active');
      });
      tab.classList.add('active');
      currentType = filter;
    } else if (filter === 'high') {
      tab.classList.toggle('active');
      currentPriority = tab.classList.contains('active');
    }

    applyFilter();
  });
});

function applyFilter() {
  var visible = allJobs.filter(function(j) {
    if (j.excluded) return false;
    if (currentRegion !== 'all' && j.region !== currentRegion) return false;
    if (currentType !== 'all' && j.type !== currentType) return false;
    if (currentPriority && j.priority < 3) return false;
    return true;
  });

  renderMarkers(visible);
  renderAllJobsPanel(visible);
}

// ================================================================
// 初始化
// ================================================================
renderTodaySidebar();
applyFilter();
</script>
