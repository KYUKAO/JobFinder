<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>海外 TA 岗位地图 — TA Job Finder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #007AFF;
      --accent: #FF6B35;
      --accent-warm: #FF9500;
      --purple: #AF52DE;
      --bg: #F5F7FA;
      --card: #fff;
      --text: #1A1A2E;
      --text-secondary: #666;
      --border: #E8ECF0;
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #FF6B35, #FF9500);
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(255,107,53,0.3);
      z-index: 10;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      gap: 16px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-back {
      background: rgba(255,255,255,0.2);
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
    }
    .header-back:hover { background: rgba(255,255,255,0.3); }
    .header-title { font-size: 1.1rem; font-weight: 700; color: #fff; }
    .header-meta { font-size: 0.75rem; color: rgba(255,255,255,0.8); margin-top: 2px; }
    #new-badge {
      background: #fff;
      color: var(--accent);
      font-weight: 700;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .filter-bar {
      background: var(--card);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .filter-tab {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid transparent;
      background: var(--bg);
      color: var(--text-secondary);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
    .filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .filter-tab.active.indie { background: var(--accent-warm); border-color: var(--accent-warm); }
    .filter-tab.active.fang { background: #00B4D8; border-color: #00B4D8; }

    .container {
      display: grid;
      grid-template-columns: 400px 1fr;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      background: var(--card);
      overflow-y: auto;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 14px 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--card);
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .job-card {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .job-card:hover, .job-card.active { background: #FFF8F5; }
    .job-card.active { border-left: 3px solid var(--accent); }

    .job-company {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .job-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .job-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 0.72rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 600;
    }
    .badge-fulltime { background: #E8F4FF; color: var(--primary); }
    .badge-contractor { background: #F3E8FF; color: var(--purple); }
    .badge-aaa { background: #FFF0EB; color: var(--accent); }
    .badge-indie { background: #FFF8E8; color: var(--accent-warm); }
    .badge-fang { background: #E8F9FD; color: #00B4D8; }
    .badge-salary { background: #E8F9ED; color: #34C759; }
    .badge-new {
      background: var(--accent);
      color: #fff;
      position: absolute;
      top: 10px; right: 12px;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 8px;
    }
    .job-dist { font-size: 0.75rem; color: var(--accent); font-weight: 600; margin-top: 4px; }
    .job-address { font-size: 0.72rem; color: #999; margin-top: 4px; }

    .jd-section {
      background: #FAFAFA;
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      margin-top: 8px;
      border-radius: 0 0 8px 8px;
      display: none;
    }
    .jd-section.open { display: block; }
    .jd-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .jd-content {
      font-size: 0.8rem;
      color: var(--text);
      line-height: 1.7;
    }
    .jd-content p { margin-bottom: 8px; }
    .jd-content ul { padding-left: 16px; margin-bottom: 8px; }
    .jd-apply-btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 20px;
      margin-top: 12px;
      transition: background 0.2s;
    }
    .jd-apply-btn:hover { background: #E05A2B; }

    .map-wrapper { position: relative; }
    #map { width: 100%; height: 100%; }

    .map-legend {
      position: absolute;
      bottom: 24px;
      right: 16px;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.75rem;
      z-index: 1000;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .map-legend h4 {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      color: var(--text);
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Marker pulse animation */
    @keyframes markerPulse {
      0% { box-shadow: 0 0 0 0 rgba(255,107,53,0.6); }
      70% { box-shadow: 0 0 0 12px rgba(255,107,53,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,107,53,0); }
    }
    .marker-new { animation: markerPulse 2s ease-out infinite; }

    /* Hover tooltip */
    .marker-tooltip {
      position: fixed; z-index: 9999;
      background: rgba(26,26,46,0.92); color: #fff;
      padding: 10px 14px; border-radius: 10px;
      font-size: 0.78rem; line-height: 1.5;
      max-width: 220px; pointer-events: none;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      transition: opacity 0.15s; opacity: 0;
    }
    .marker-tooltip.visible { opacity: 1; }
    .mtp-company { font-weight: 700; font-size: 0.82rem; }
    .mtp-title { font-size: 0.8rem; margin-top: 4px; }
    .mtp-salary { color: #34C759; font-weight: 600; margin-top: 4px; }
    .mtp-new { color: #FF6B35; font-weight: 700; margin-top: 4px; }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; grid-template-rows: 260px 1fr; }
      .sidebar { order: 2; }
      .map-wrapper { order: 1; }
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: var(--border); }
    .sidebar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <a href="index.html" class="header-back">← 首页</a>
      <div>
        <div class="header-title">🌎 海外 TA 岗位地图</div>
        <div class="header-meta">University of Utah 为起点 · 通勤距离一览</div>
      </div>
    </div>
    <span id="new-badge">— 个今日新岗位</span>
  </div>
</header>

<div class="marker-tooltip" id="marker-tooltip">
  <div class="mtp-company" id="mtp-company"></div>
  <div class="mtp-title" id="mtp-title"></div>
  <div class="mtp-salary" id="mtp-salary"></div>
  <div class="mtp-new" id="mtp-new"></div>
</div>

<div class="filter-bar">
  <span class="filter-tab active" data-filter="all">全部</span>
  <span class="filter-tab" data-filter="aaa">AAA</span>
  <span class="filter-tab indie" data-filter="indie">Indie</span>
  <span class="filter-tab fang" data-filter="fang">Big Tech</span>
  <div style="flex:1;"></div>
  <select id="sort-select" style="font-size:0.75rem;padding:4px 8px;border-radius:8px;border:1px solid var(--border);">
    <option value="priority">优先级</option>
    <option value="distance">距离</option>
    <option value="new">最新发布</option>
  </select>
</div>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Open Positions</span>
      <span id="visible-count" style="font-weight:400;color:var(--accent);">0 / 0</span>
    </div>
    <div id="job-list"></div>
  </div>

  <div class="map-wrapper">
    <div id="map"></div>
    <div class="map-legend">
      <h4>Legend 图例</h4>
      <div class="legend-item"><div class="legend-dot" style="background:#e94560;"></div>U of U（当前位置）</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FF6B35;"></div>AAA 公司</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FF9500;"></div>Indie</div>
      <div class="legend-item"><div class="legend-dot" style="background:#00B4D8;"></div>Big Tech</div>
    </div>
  </div>
</div>

<script>
var UOU = [40.7649, -111.8421];

var overseasJobs = [
  {
    id: 1,
    name: "Associate Technical Artist, Characters",
    company: "Avalanche / WB Games",
    address: "282 W 3900 S, South Salt Lake, UT",
    lat: 40.7000,
    lng: -111.9022,
    category: "aaa",
    type: "Full-time",
    priority: 3,
    salary: "—",
    distance: "~6.2 mi · ~12 min",
    url: "https://www.linkedin.com/jobs/view/4394955921/",
    postedDate: "2026-04-12",
    excluded: false,
    jd: "The Associate Technical Artist will work closely with the Character Art team to develop and maintain character asset pipelines. Responsibilities include creating and maintaining character rigs and deformation tools; troubleshooting character performance issues; collaborating with animators to ensure proper deformation and skin weighting; developing Maya scripts and tools to streamline character workflows. Requirements: Strong Maya and rigging knowledge; proficiency in Python/MEL scripting; experience with game engine character import pipelines; understanding of character deformation and skin weighting. This role is hybrid (3 days in-office) in South Salt Lake."
  },
  {
    id: 2,
    name: "Advanced Technical Artist, Environment",
    company: "Avalanche / WB Games",
    address: "282 W 3900 S, South Salt Lake, UT",
    lat: 40.7000,
    lng: -111.9022,
    category: "aaa",
    type: "Full-time",
    priority: 3,
    salary: "$151K–$281K",
    distance: "~6.2 mi · ~12 min",
    url: "https://careers.wbd.com/global/en/job/R000104174/",
    postedDate: "2026-04-12",
    excluded: false,
    jd: "The Advanced Technical Artist will be responsible for developing environment art pipelines and tools for the Avalanche Studio's open-world game. Responsibilities: architect and maintain environment asset pipelines (terrain, foliage, architecture); develop Houdini and Python scripts for procedural environment workflows; optimize environment assets for real-time rendering; collaborate with environment artists to solve complex technical challenges. Requirements: 5+ years of technical art experience; expert-level Houdini, Python, and shader authoring; deep understanding of real-time rendering optimization; experience with open-world game environment pipelines. Salary range: $151K–$281K depending on experience."
  },
  {
    id: 3,
    name: "Lead Technical Artist — Characters",
    company: "Warner Bros. Discovery",
    address: "282 W 3900 S, South Salt Lake, UT",
    lat: 40.7000,
    lng: -111.9022,
    category: "aaa",
    type: "Full-time",
    priority: 3,
    salary: "—",
    distance: "~6.2 mi · ~12 min",
    url: "https://www.showbizjobs.com/jobs/warner-bros-discovery-lead-technical-artist-characters-in-salt-lake-city/jid-yjk5jk",
    postedDate: "2026-04-10",
    excluded: false,
    jd: "The Lead Technical Artist will oversee the character technical art team, ensuring high-quality character assets across all projects. Responsibilities: lead and mentor the character TA team; define and enforce character technical standards; work with outsourcing teams to maintain quality; prototype new character pipeline technologies. Requirements: 8+ years in technical art with 2+ years in a leadership role; expert knowledge of Maya, Unreal Engine, and character deformation; strong communication and team leadership skills; experience shipping AAA titles."
  },
  {
    id: 4,
    name: "Technical Artist — Rendering",
    company: "Meta",
    address: "10407 S Commerce Center Dr, South Jordan, UT",
    lat: 40.5623,
    lng: -111.9838,
    category: "fang",
    type: "Contractor",
    priority: 2,
    salary: "$57K–$141K",
    distance: "~17.5 mi · ~22 min",
    url: "https://www.zippia.com/technical-artist-salt-lake-city-ut-jobs/",
    postedDate: "2026-04-09",
    excluded: false,
    jd: "The Technical Artist will support Meta's Reality Labs AR/VR rendering team. Responsibilities: develop and optimize shaders for AR/VR applications; research and implement advanced rendering techniques; collaborate with engineers to integrate art assets into real-time rendering pipelines; create technical documentation and art pipelines for AR/VR content. Requirements: strong knowledge of rendering pipelines and GPU architecture; proficiency in shader languages (HLSL, GLSL); experience with AR/VR rendering optimization; understanding of mobile GPU constraints. Note: This is a contractor role (W2) with potential conversion to full-time."
  }
];

var today = new Date();
var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

function isToday(d) { return d === todayStr; }
function getCatColor(c) { return { aaa:'#FF6B35', indie:'#FF9500', fang:'#00B4D8' }[c] || '#5AC8FA'; }
function mkIcon(color, sz, isNew) {
  sz = sz || 14;
  var glow = isNew ? 'box-shadow:0 0 10px ' + color + ';' : '';
  var anim = isNew ? 'animation:markerPulse 2s ease-out infinite;' : '';
  return L.divIcon({ className: isNew ? 'marker-new' : '', html:'<div style="width:'+sz+'px;height:'+sz+'px;background:'+color+';border:'+(isNew?'3px':'2.5px')+' solid #fff;border-radius:50%;'+glow+anim+'"></div>', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2] });
}

var map = L.map('map', { zoomControl:true, scrollWheelZoom:true }).setView(UOU, 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OSM', maxZoom: 19
}).addTo(map);

L.marker(UOU, {icon:mkIcon('#e94560', 20)})
  .addTo(map)
  .bindPopup('<b style="color:#e94560">University of Utah</b><br><small>当前位置 · 201 Presidents Cir</small>');

var markerMap = {};

function buildPopup(j) {
  var isNew = isToday(j.postedDate);
  var stars = '⭐'.repeat(j.priority);
  var newTag = isNew ? '<span style="background:#FF6B35;color:#fff;padding:2px 8px;border-radius:8px;font-size:0.75rem;font-weight:700;margin-bottom:6px;display:inline-block;">🆕 今日新</span><br><br>' : '';
  return '<b style="color:'+getCatColor(j.category)+'">'+j.company+'</b><br>' +
    '<b>'+j.name+'</b><br><small>'+j.address+'</small><br><br>' +
    newTag +
    (j.distance?'<b>📍 距 U of U：</b>'+j.distance+'<br>':'') +
    (j.salary!=='—'?'<b>💰 薪资：</b>'+j.salary+'<br>':'') +
    '<b>🏷 类型：</b>'+j.type+'<br>' +
    '<b>优先级：</b>'+stars+'<br><br>' +
    '<a href="'+j.url+'" target="_blank" style="color:#007AFF;font-size:0.85em;">🔗 查看职位 →</a>';
}

function renderMarkers(visibleJobs) {
  Object.values(markerMap).forEach(function(m){ map.removeLayer(m); });
  markerMap = {};
  visibleJobs.forEach(function(j) {
    if (j.excluded) return;
    var color = getCatColor(j.category);
    var isNew = isToday(j.postedDate);
    var m = L.marker([j.lat,j.lng],{icon:mkIcon(isNew?'#FF6B35':color, isNew?18:14, isNew)}).addTo(map);
    m.bindPopup(buildPopup(j));
    markerMap[j.id] = m;
  });
}

function renderSidebar(visibleJobs) {
  var listEl = document.getElementById('job-list');
  document.getElementById('visible-count').textContent = visibleJobs.length + ' / ' + overseasJobs.length;
  listEl.innerHTML = '';
  visibleJobs.forEach(function(j) {
    if (j.excluded) return;
    var isNew = isToday(j.postedDate);
    var typeClass = { 'Full-time':'badge-fulltime', 'Contractor':'badge-contractor' }[j.type] || 'badge-fulltime';
    var catBadge = j.category ? '<span class="badge badge-'+j.category+'">'+j.category.toUpperCase()+'</span>' : '';
    var salaryBadge = j.salary && j.salary !== '—' ? '<span class="badge badge-salary">'+j.salary+'</span>' : '';
    var stars = '⭐'.repeat(j.priority);
    var el = document.createElement('div');
    el.className = 'job-card';
    el.id = 'card-' + j.id;
    el.innerHTML =
      (isNew?'<span class="badge badge-new">🆕 今日新</span>':'') +
      '<div class="job-company">'+j.company+'</div>' +
      '<div class="job-title">'+j.name+'</div>' +
      '<div class="job-meta">' +
        '<span class="badge '+typeClass+'">'+j.type+'</span>' +
        catBadge +
        salaryBadge +
      '</div>' +
      '<div class="job-dist">📍 距 U of U '+j.distance+'</div>' +
      '<div class="job-address">'+j.address+'</div>' +
      '<div class="jd-section" id="jd-'+j.id+'">' +
        '<div class="jd-label">Job Description</div>' +
        '<div class="jd-content">'+j.jd.replace(/\n/g, '<br>')+'</div>' +
        '<a href="'+j.url+'" target="_blank" class="jd-apply-btn">Apply Now →</a>' +
      '</div>';
    el.addEventListener('click', function(e){ e.stopPropagation(); focusJob(j.id); });
    listEl.appendChild(el);
  });
}

function focusJob(id) {
  document.querySelectorAll('.job-card').forEach(function(c){ c.classList.remove('active'); });
  var card = document.getElementById('card-'+id);
  if (!card) return;
  card.classList.add('active');
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
  var jdEl = document.getElementById('jd-'+id);
  if (jdEl) {
    var wasOpen = jdEl.classList.contains('open');
    document.querySelectorAll('.jd-section').forEach(function(el){ el.classList.remove('open'); });
    if (!wasOpen) jdEl.classList.add('open');
  }
  var job = overseasJobs.find(function(j){ return j.id===id; });
  if (job && markerMap[id]) {
    map.setView([job.lat,job.lng], 13, {animate:true});
    setTimeout(function(){ markerMap[id].openPopup(); }, 200);
  }
}

renderSidebar(overseasJobs);
renderMarkers(overseasJobs);

// Marker hover tooltip
var tooltip = document.getElementById('marker-tooltip');
document.addEventListener('mousemove', function(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
});
setTimeout(function() {
  Object.keys(markerMap).forEach(function(id) {
    var marker = markerMap[id];
    var job = overseasJobs.find(function(j){ return j.id === parseInt(id); });
    if (!job) return;
    marker.on('mouseover', function() {
      document.getElementById('mtp-company').textContent = job.company;
      document.getElementById('mtp-title').textContent = job.name;
      document.getElementById('mtp-salary').textContent = job.salary && job.salary !== '—' ? job.salary : '';
      document.getElementById('mtp-new').textContent = isToday(job.postedDate) ? '🆕 今日新岗位' : '';
      tooltip.classList.add('visible');
    });
    marker.on('mouseout', function() { tooltip.classList.remove('visible'); });
    marker.on('click', function() { tooltip.classList.remove('visible'); });
  });
}, 600);

var currentFilter = 'all';
document.querySelectorAll('.filter-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.filter-tab').forEach(function(t){ t.classList.remove('active'); });
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    applyFilter();
  });
});

function applyFilter() {
  var sortBy = document.getElementById('sort-select').value;
  var visible = overseasJobs.filter(function(j) {
    if (j.excluded) return false;
    if (currentFilter === 'all') return true;
    return j.category === currentFilter;
  });
  if (sortBy==='priority') visible.sort(function(a,b){return b.priority-a.priority;});
  else if (sortBy==='distance') visible.sort(function(a,b){
    var da = parseFloat(a.distance)||0, db = parseFloat(b.distance)||0;
    return da-db;
  });
  else if (sortBy==='new') visible.sort(function(a,b){return b.postedDate.localeCompare(a.postedDate);});
  renderSidebar(visible);
  renderMarkers(visible);
}
document.getElementById('sort-select').addEventListener('change', applyFilter);
