<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国内 TA 岗位 — TA Job Finder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #FF6B35;
      --primary-dark: #E55A1F;
      --accent: #FF9500;
      --success: #34C759;
      --danger: #FF3B30;
      --purple: #AF52DE;
      --bg: #F5F7FA;
      --card: #fff;
      --text: #1A1A2E;
      --text-secondary: #666;
      --border: #E8ECF0;
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #FF6B35, #FF9500);
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(255,107,53,0.3);
      z-index: 10;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-back {
      background: rgba(255,255,255,0.2);
      color: #fff;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
    }
    .header-back:hover { background: rgba(255,255,255,0.3); }
    .header-title { font-size: 1.05rem; font-weight: 700; color: #fff; }
    .header-meta { font-size: 0.72rem; color: rgba(255,255,255,0.8); margin-top: 1px; }

    /* 多行筛选栏 */
    .filter-panel {
      background: var(--card);
      padding: 8px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .filter-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .filter-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-secondary);
      min-width: 60px;
      flex-shrink: 0;
    }
    .filter-btn {
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid transparent;
      background: var(--bg);
      color: var(--text-secondary);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
    .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* 经验等级 badge 颜色 */
    .filter-btn.level-intern.active { background: #34C759; border-color: #34C759; }
    .filter-btn.level-entry.active { background: #5AC8FA; border-color: #5AC8FA; }
    .filter-btn.level-mid.active { background: var(--primary); border-color: var(--primary); }
    .filter-btn.level-senior.active { background: #AF52DE; border-color: #AF52DE; }
    .filter-btn.level-lead.active { background: #FF3B30; border-color: #FF3B30; }

    /* 细分 TA badge */
    .filter-btn.ta-general.active { background: var(--primary); border-color: var(--primary); }
    .filter-btn.ta-rendering.active { background: #FF9500; border-color: #FF9500; }
    .filter-btn.ta-character.active { background: #5856D6; border-color: #5856D6; }
    .filter-btn.ta-pipeline.active { background: #34C759; border-color: #34C759; }
    .filter-btn.ta-environment.active { background: #00B4D8; border-color: #00B4D8; }
    .filter-btn.ta-ui.active { background: #FF2D55; border-color: #FF2D55; }

    .stats-bar {
      background: rgba(255,107,53,0.06);
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .stats-bar strong { color: var(--primary); }

    .container {
      display: grid;
      grid-template-columns: 380px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* 侧边栏 */
    .sidebar {
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .sidebar-header strong { color: var(--primary); font-size: 0.85rem; }
    .job-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .job-card {
      background: var(--bg);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
      position: relative;
    }
    .job-card:hover { border-color: var(--primary); background: #fff; }
    .job-card.focused { border-color: var(--primary); background: #fff; box-shadow: 0 2px 12px rgba(255,107,53,0.15); }

    .job-new-tag {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 8px;
      margin-bottom: 4px;
    }
    .job-company {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }
    .job-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .job-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 6px;
    }
    .badge {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .badge-level-intern { background: rgba(52,199,89,0.15); color: #34C759; }
    .badge-level-entry { background: rgba(90,200,250,0.15); color: #5AC8FA; }
    .badge-level-mid { background: rgba(255,107,53,0.15); color: #E55A1F; }
    .badge-level-senior { background: rgba(175,82,222,0.15); color: #AF52DE; }
    .badge-level-lead { background: rgba(255,59,48,0.15); color: #FF3B30; }
    .badge-salary { background: rgba(255,149,0,0.15); color: #CC7700; }
    .badge-source { background: var(--border); color: var(--text-secondary); }
    .badge-ta { background: rgba(88,86,214,0.12); color: #5856D6; }

    .job-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      color: var(--text-secondary);
    }
    .job-deadline {
      display: flex;
      align-items: center;
      gap: 3px;
      font-weight: 600;
    }
    .job-deadline.soon { color: var(--danger); }
    .job-deadline.normal { color: var(--success); }
    .job-deadline.urgent { color: var(--danger); animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* JD 详情 */
    .jd-section {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--text-secondary);
    }
    .jd-section.open { display: block; }
    .jd-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--primary);
      margin-bottom: 6px;
    }
    .jd-content {
      max-height: 180px;
      overflow-y: auto;
      padding-right: 4px;
      margin-bottom: 8px;
    }
    .jd-apply-btn {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 20px;
      transition: background 0.15s;
    }
    .jd-apply-btn:hover { background: var(--primary-dark); }

    /* 地图 */
    #map {
      flex: 1;
      min-height: 0;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    .popup-company { font-size: 0.9rem; font-weight: 700; }
    .popup-title { font-size: 0.85rem; margin: 4px 0; }
    .popup-meta { font-size: 0.78rem; color: #666; }
    .popup-link { color: #007AFF; font-size: 0.82rem; font-weight: 600; text-decoration: none; }
    .popup-link:hover { text-decoration: underline; }
    .popup-new {
      display: inline-block;
      background: #FF6B35;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 8px;
      margin-bottom: 6px;
    }
    .popup-deadline { font-size: 0.78rem; color: #FF3B30; font-weight: 600; margin: 4px 0; }

    /* 移动端 */
    @media (max-width: 768px) {
      body { height: auto; overflow: auto; }
      .container { grid-template-columns: 1fr; }
      #map { height: 300px; order: -1; }
      .sidebar { height: auto; max-height: 60vh; }
      .job-list { max-height: 50vh; }
      .header-inner { padding: 10px 12px; }
      .header-title { font-size: 0.95rem; }
      .filter-panel { padding: 8px 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <a href="index.html" class="header-back">← 返回</a>
      <div>
        <div class="header-title">国内 TA 岗位</div>
        <div class="header-meta" id="header-meta">加载中...</div>
      </div>
    </div>
  </div>
</header>

<div class="filter-panel">
  <!-- 经验等级 -->
  <div class="filter-row">
    <span class="filter-label">经验</span>
    <button class="filter-btn level-all active" data-filter="level" data-value="all">全部</button>
    <button class="filter-btn level-intern" data-filter="level" data-value="intern">实习</button>
    <button class="filter-btn level-entry" data-filter="level" data-value="entry">1年以下</button>
    <button class="filter-btn level-mid" data-filter="level" data-value="mid">1-3年</button>
    <button class="filter-btn level-senior" data-filter="level" data-value="senior">3-5年</button>
  </div>
  <!-- TA 细分 -->
  <div class="filter-row">
    <span class="filter-label">方向</span>
    <button class="filter-btn ta-all active" data-filter="ta" data-value="all">全部</button>
    <button class="filter-btn ta-rendering" data-filter="ta" data-value="rendering">渲染 TA</button>
    <button class="filter-btn ta-character" data-filter="ta" data-value="character">角色 TA</button>
    <button class="filter-btn ta-pipeline" data-filter="ta" data-value="pipeline">流程 TA</button>
    <button class="filter-btn ta-environment" data-filter="ta" data-value="environment">环境 TA</button>
    <button class="filter-btn ta-ui" data-filter="ta" data-value="ui">UI TA</button>
    <button class="filter-btn ta-general" data-filter="ta" data-value="general">综合 TA</button>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  加载中...
</div>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-header" id="sidebar-header">加载中...</div>
    <div class="job-list" id="job-list"></div>
  </div>
  <div id="map"></div>
</div>

<script>
var domesticJobs = [];
var currentLevel = 'all';
var currentTa = 'all';
var currentSearch = '';
var focusedId = null;

var today = new Date();
var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

function isToday(d) { return d === todayStr; }

function getDeadlineClass(daysLeft) {
  if (daysLeft <= 3) return 'urgent';
  if (daysLeft <= 7) return 'soon';
  return 'normal';
}

function getDeadlineText(daysLeft) {
  if (daysLeft <= 0) return '已截止';
  if (daysLeft === 1) return '明天截止';
  if (daysLeft <= 7) return daysLeft + '天后截止';
  return daysLeft + '天';
}

function getDeadlineColor(daysLeft) {
  if (daysLeft <= 3) return '#FF3B30';
  if (daysLeft <= 7) return '#FF9500';
  return '#34C759';
}

// 城市坐标
var cityCoords = {
  '深圳': [22.5431, 114.0579],
  '广州': [23.1291, 113.2644],
  '上海': [31.2304, 121.4737],
  '北京': [39.9042, 116.4074],
  '杭州': [30.2741, 120.1536],
  '成都': [30.5728, 104.0668],
  '武汉': [30.5928, 114.3055],
  '苏州': [31.2989, 120.5853],
  '珠海': [22.2710, 113.5767],
  '福州': [26.0745, 119.2965],
  '南京': [32.0603, 118.7969],
  '西安': [34.3416, 108.9398],
  '其他': [31.2304, 121.4737],
};

function getLatLng(city) {
  var c = cityCoords[city] || cityCoords['其他'];
  return [c[0] + (Math.random()-0.5)*0.05, c[1] + (Math.random()-0.5)*0.05];
}

// 筛选
function getFiltered() {
  return domesticJobs.filter(function(j) {
    if (j.excluded) return false;
    if (currentLevel !== 'all' && j.level !== currentLevel) return false;
    if (currentTa !== 'all' && j.taSubCategory !== currentTa) return false;
    if (currentSearch) {
      var s = currentSearch.toLowerCase();
      if (!j.name.toLowerCase().includes(s) && !j.company.toLowerCase().includes(s) && !(j.city||'').includes(s)) return false;
    }
    return true;
  });
}

// 侧边栏渲染
function renderSidebar(jobs) {
  var listEl = document.getElementById('job-list');
  var total = domesticJobs.filter(function(j){ return !j.excluded; }).length;
  document.getElementById('sidebar-header').innerHTML =
    '<strong>' + jobs.length + '</strong> / ' + total + ' 个岗位';
  listEl.innerHTML = '';

  if (jobs.length === 0) {
    listEl.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#666;">没有找到符合条件的岗位</div>';
    return;
  }

  jobs.forEach(function(j) {
    var isNew = isToday(j.postedDate);
    var dlClass = getDeadlineClass(j.daysLeft);
    var dlText = getDeadlineText(j.daysLeft);
    var dlColor = getDeadlineColor(j.daysLeft);

    var el = document.createElement('div');
    el.className = 'job-card';
    el.id = 'card-' + j.id;

    var hasJd = j.jd && j.jd.length > 10;

    el.innerHTML =
      (isNew ? '<span class="job-new-tag">🆕 今日新</span>' : '') +
      '<div class="job-company">' + j.company + ' · ' + j.city + '</div>' +
      '<div class="job-title">' + j.name + '</div>' +
      '<div class="job-badges">' +
        '<span class="badge badge-level-' + j.level + '">' + j.levelLabel + '</span>' +
        '<span class="badge badge-ta">' + j.taSubLabel + '</span>' +
        (j.salary !== '—' ? '<span class="badge badge-salary">' + j.salary + '</span>' : '') +
        '<span class="badge badge-source">' + j.source + '</span>' +
      '</div>' +
      '<div class="job-meta-row">' +
        '<span style="color:' + dlColor + ';font-weight:600;font-size:0.72rem;">⏰ ' + dlText + '</span>' +
        '<span style="font-size:0.7rem;color:#999;">' + j.postedDate + '</span>' +
      '</div>' +
      (hasJd ? '<div class="jd-section" id="jd-' + j.id + '">' +
        '<div class="jd-label">岗位职责 & 要求</div>' +
        '<div class="jd-content">' + j.jd.replace(/\n/g, '<br>') + '</div>' +
        '<a href="' + j.url + '" target="_blank" class="jd-apply-btn">申请岗位 →</a>' +
       '</div>' : '<a href="' + j.url + '" target="_blank" class="jd-apply-btn" style="margin-top:8px;">申请岗位 →</a>');

    el.addEventListener('click', function(e) {
      if (hasJd) {
        var jdEl = document.getElementById('jd-' + j.id);
        if (jdEl) {
          jdEl.classList.toggle('open');
          e.stopPropagation();
        }
      }
      focusJob(j.id);
    });

    listEl.appendChild(el);
  });
}

function focusJob(id) {
  document.querySelectorAll('.job-card').forEach(function(c){ c.classList.remove('focused'); });
  var card = document.getElementById('card-' + id);
  if (card) {
    card.classList.add('focused');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  focusedId = id;
  var marker = markerMap[id];
  if (marker) {
    marker.openPopup();
    map.setView(marker.getLatLng(), 13);
  }
}

// 地图
var map = L.map('map', { zoomControl:true, scrollWheelZoom:true }).setView([31.2304, 121.4737], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OSM', maxZoom: 19
}).addTo(map);

var markerMap = {};

function getLevelColor(level) {
  var colors = {
    'intern': '#34C759', 'entry': '#5AC8FA', 'mid': '#FF6B35',
    'senior': '#AF52DE', 'lead': '#FF3B30'
  };
  return colors[level] || '#FF6B35';
}

function mkIcon(color, sz) {
  sz = sz || 12;
  return L.divIcon({
    className: '',
    html: '<div style="width:'+sz+'px;height:'+sz+'px;background:'+color+';border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>',
    iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]
  });
}

function buildPopup(j) {
  var isNew = isToday(j.postedDate);
  var dlClass = getDeadlineClass(j.daysLeft);
  var dlText = getDeadlineText(j.daysLeft);
  var dlColor = getDeadlineColor(j.daysLeft);
  var newTag = isNew ? '<span class="popup-new">🆕 今日新</span><br>' : '';
  return '<b style="color:#FF6B35;font-size:0.9rem;">' + j.company + '</b><br>' +
    '<b style="font-size:0.85rem;">' + j.name + '</b><br>' +
    newTag +
    '<span class="popup-meta">' + j.city + ' · ' + j.levelLabel + ' · ' + j.taSubLabel + '</span><br>' +
    (j.salary !== '—' ? '<b style="font-size:0.82rem;color:#CC7700;">' + j.salary + '</b><br>' : '') +
    '<span style="color:' + dlColor + ';font-size:0.78rem;font-weight:600;">⏰ ' + dlText + '</span><br><br>' +
    '<a href="' + j.url + '" target="_blank" class="popup-link">查看岗位详情 →</a>';
}

function renderMarkers(visibleJobs) {
  Object.values(markerMap).forEach(function(m){ map.removeLayer(m); });
  markerMap = {};
  visibleJobs.forEach(function(j) {
    var coords = getLatLng(j.city);
    var color = getLevelColor(j.level);
    var sz = j.level === 'intern' ? 10 : j.level === 'senior' || j.level === 'lead' ? 14 : 12;
    var m = L.marker(coords, {icon: mkIcon(color, sz)}).addTo(map);
    m.bindPopup(buildPopup(j));
    m.on('click', function() { focusJob(j.id); });
    markerMap[j.id] = m;
  });
}

function renderStats(jobs) {
  var total = domesticJobs.filter(function(j){ return !j.excluded; });
  var levelCounts = {intern:0, entry:0, mid:0, senior:0, lead:0};
  var taCounts = {};
  var urgent = jobs.filter(function(j){ return j.daysLeft <= 7; }).length;
  var deadlineSoon = total.filter(function(j){ return j.daysLeft <= 7; }).length;

  total.forEach(function(j) {
    if (levelCounts.hasOwnProperty(j.level)) levelCounts[j.level]++;
    taCounts[j.taSubCategory] = (taCounts[j.taSubCategory]||0) + 1;
  });

  var maxTa = Object.keys(taCounts).sort(function(a,b){ return taCounts[b]-taCounts[a]; })[0] || 'general';
  var taLabels = {character:'角色 TA', environment:'环境 TA', rendering:'渲染 TA',
                  pipeline:'流程 TA', ui:'UI TA', general:'综合 TA'};

  document.getElementById('stats-bar').innerHTML =
    '共 <strong>' + total.length + '</strong> 个岗位 | ' +
    '本次筛选 <strong>' + jobs.length + '</strong> 个 | ' +
    '<span style="color:#FF3B30;font-weight:600;">⚠ ' + deadlineSoon + ' 个即将截止</span> | ' +
    '热门方向：<strong>' + (taLabels[maxTa]||'综合 TA') + '</strong>（' + taCounts[maxTa] + '）';
}

function initFilters() {
  document.querySelectorAll('.filter-btn[data-filter]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var filterType = btn.dataset.filter;
      var value = btn.dataset.value;

      document.querySelectorAll('.filter-btn[data-filter="'+filterType+'"]').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');

      if (filterType === 'level') currentLevel = value;
      if (filterType === 'ta') currentTa = value;

      applyFilters();
    });
  });
}

function applyFilters() {
  var filtered = getFiltered();
  renderSidebar(filtered);
  renderMarkers(filtered);
  renderStats(filtered);
}

// 加载数据
async function loadData() {
  try {
    var resp = await fetch('jobs-domestic.json');
    var data = await resp.json();
    domesticJobs = data.domesticJobs || data || [];

    var total = domesticJobs.filter(function(j){ return !j.excluded; }).length;
    document.getElementById('header-meta').textContent = '共 ' + total + ' 个岗位 · 更新于 ' + (data.updated || todayStr);
    document.title = '国内 TA 岗位（' + total + '） — TA Job Finder';

    applyFilters();
  } catch(e) {
    document.getElementById('job-list').innerHTML = '<div style="padding:20px;text-align:center;color:#999;">数据加载失败</div>';
  }
}

initFilters();
