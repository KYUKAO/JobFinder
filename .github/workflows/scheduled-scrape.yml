name: Daily Scrape — TA Jobs

on:
  schedule:
    # 每天北京时间 8:00 = UTC 0:00
    - cron: '0 0 * * *'
  workflow_dispatch:   # 也支持手动触发
    inputs:
      target:
        description: '爬取目标 (all / overseas / domestic / portfolios)'
        required: false
        default: 'all'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml playwright
          playwright install chromium --with-deps

      - name: Run scrapers
        env:
          SCRAPE_TARGET: ${{ github.event.inputs.target || 'all' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd scripts
          python updater.py

      - name: Check changes
        id: changed
        run: |
          if git diff --stat | grep -q "."; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          TODAY=$(date +%Y-%m-%d)
          git commit -m "auto: daily scrape update $TODAY"
          git push

      - name: No changes
        if: steps.changed.outputs.has_changes == 'false'
        run: echo "No changes detected, skipping commit."
