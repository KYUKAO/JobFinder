<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国内 TA 岗位 — TA Job Finder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --card: #16161d;
      --card-hover: #1e1e28;
      --primary: #6366f1;
      --text: #f1f1f4;
      --text-muted: #71717a;
      --border: rgba(255,255,255,0.06);
      --intern: #22c55e;
      --entry: #06b6d4;
      --mid: #f59e0b;
      --senior: #a855f7;
      --lead: #ef4444;
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* Header */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      z-index: 10;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .back-btn:hover { border-color: var(--primary); color: var(--text); }

    .header-info { flex: 1; min-width: 0; }
    .header-title { font-size: 1rem; font-weight: 700; }
    .header-meta { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
    .header-stats { display: flex; gap: 8px; flex-shrink: 0; }
    .header-stat {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .header-stat.intern { background: rgba(34,197,94,0.15); color: var(--intern); }
    .header-stat.entry { background: rgba(6,182,212,0.15); color: var(--entry); }
    .header-stat.mid { background: rgba(245,158,11,0.15); color: var(--mid); }

    /* Filter tabs */
    .filter-tabs {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 10px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* Layout */
    .main {
      display: grid;
      grid-template-columns: 360px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar job list */
    .sidebar {
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .job-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .job-list::-webkit-scrollbar { width: 4px; }
    .job-list::-webkit-scrollbar-track { background: transparent; }
    .job-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .job-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .job-card:hover { border-color: var(--primary); background: var(--card-hover); }
    .job-card.focused { border-color: var(--primary); background: var(--card-hover); }

    .job-new {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .job-company {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .job-title {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .job-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .badge-intern { background: rgba(34,197,94,0.15); color: var(--intern); }
    .badge-entry { background: rgba(6,182,212,0.15); color: var(--entry); }
    .badge-mid { background: rgba(245,158,11,0.15); color: var(--mid); }
    .badge-senior { background: rgba(168,85,247,0.15); color: var(--senior); }
    .badge-salary { background: rgba(99,102,241,0.12); color: #818cf8; }

    .job-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .job-deadline { font-weight: 600; }
    .job-deadline.ok { color: var(--intern); }
    .job-deadline.warn { color: var(--mid); }
    .job-deadline.urgent { color: var(--lead); animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .job-source {
      background: var(--border);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.65rem;
    }

    /* JD detail */
    .jd-section { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .jd-section.open { display: block; }
    .jd-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--primary); margin-bottom: 6px; }
    .jd-content { font-size: 0.78rem; line-height: 1.7; color: var(--text-muted); max-height: 160px; overflow-y: auto; margin-bottom: 10px; }
    .jd-content::-webkit-scrollbar { width: 3px; }
    .jd-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .apply-btn {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 20px;
      transition: background 0.15s;
    }
    .apply-btn:hover { background: #4f46e5; }

    /* Map */
    #map { flex: 1; min-height: 0; }
    .leaflet-popup-content-wrapper { border-radius: 12px; background: var(--card); color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 1px solid var(--border); }
    .leaflet-popup-tip { background: var(--card); }
    .leaflet-popup-content { margin: 12px 16px; font-family: inherit; }
    .popup-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
    .popup-company { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; }
    .popup-meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; }
    .popup-link { color: var(--primary); font-size: 0.8rem; font-weight: 600; }

    /* Mobile */
    @media (max-width: 768px) {
      body { height: auto; overflow: auto; }
      .main { grid-template-columns: 1fr; }
      #map { height: 280px; order: -1; }
      .sidebar { height: auto; max-height: 60vh; }
      .job-list { max-height: 50vh; }
      .header { padding: 10px 12px; gap: 10px; }
      .header-stats { gap: 4px; }
      .header-stat { padding: 3px 8px; font-size: 0.65rem; }
    }
  </style>
</head>
<body>

<header class="header">
  <a href="index.html" class="back-btn">← 返回</a>
  <div class="header-info">
    <div class="header-title" id="header-title">国内 TA 岗位</div>
    <div class="header-meta" id="header-meta">加载中...</div>
  </div>
  <div class="header-stats" id="header-stats"></div>
</header>

<div class="filter-tabs">
  <button class="tab-btn active" data-filter="all">全部</button>
  <button class="tab-btn" data-filter="intern">实习</button>
  <button class="tab-btn" data-filter="entry">1年以下</button>
  <button class="tab-btn" data-filter="mid">1-3年</button>
  <button class="tab-btn" data-filter="senior">3-5年</button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header" id="sidebar-header">加载中...</div>
    <div class="job-list" id="job-list"></div>
  </div>
  <div id="map"></div>
</div>

<script>
var allJobs = [];
var currentFilter = 'all';

var today = new Date();
var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

var cityCoords = {
  '深圳': [22.5431, 114.0579], '广州': [23.1291, 113.2644], '上海': [31.2304, 121.4737],
  '北京': [39.9042, 116.4074], '杭州': [30.2741, 120.1536], '成都': [30.5728, 104.0668],
  '武汉': [30.5928, 114.3055], '苏州': [31.2989, 120.5853], '珠海': [22.2710, 113.5767],
  '福州': [26.0745, 119.2965], '南京': [32.0603, 118.7969], '西安': [34.3416, 108.9398],
};

function getCoords(city) {
  var c = cityCoords[city] || [31.2304, 121.4737];
  return [c[0] + (Math.random()-0.5)*0.04, c[1] + (Math.random()-0.5)*0.04];
}

function getFiltered() {
  if (currentFilter === 'all') return allJobs;
  return allJobs.filter(function(j){ return j.level === currentFilter; });
}

function getDeadlineClass(days) {
  if (days <= 3) return 'urgent';
  if (days <= 7) return 'warn';
  return 'ok';
}

function getDeadlineText(days) {
  if (days <= 0) return '已截止';
  if (days === 1) return '明天截止';
  if (days <= 7) return '剩' + days + '天';
  return days + '天';
}

function getLevelBadge(level) {
  var map = {intern:'实习', entry:'1年以下', mid:'1-3年', senior:'3-5年', lead:'5年+'};
  var cls = {intern:'badge-intern', entry:'badge-entry', mid:'badge-mid', senior:'badge-senior', lead:'badge-lead'};
  return '<span class="badge ' + (cls[level]||'') + '">' + (map[level]||level) + '</span>';
}

// 渲染侧边栏
function renderList(jobs) {
  var total = allJobs.length;
  var filtered = jobs.length;
  document.getElementById('sidebar-header').innerHTML =
    '显示 <strong>' + filtered + '</strong> / ' + total + ' 个岗位';
  var list = document.getElementById('job-list');
  list.innerHTML = '';

  if (jobs.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:0.85rem;">没有符合条件的岗位</div>';
    return;
  }

  // 默认按 intern > entry > mid > senior 排序
  var sorted = jobs.slice().sort(function(a,b){
    var order = {intern:0, entry:1, mid:2, senior:3, lead:4};
    return (order[a.level]||5) - (order[b.level]||5);
  });

  sorted.forEach(function(j) {
    var isNew = j.postedDate === todayStr;
    var dlClass = getDeadlineClass(j.daysLeft);
    var dlText = getDeadlineText(j.daysLeft);
    var hasJd = j.jd && j.jd.length > 10;

    var el = document.createElement('div');
    el.className = 'job-card';
    el.id = 'card-' + j.id;
    el.innerHTML =
      (isNew ? '<span class="job-new">NEW</span>' : '') +
      '<div class="job-company">' + j.company + ' · ' + j.city + '</div>' +
      '<div class="job-title">' + j.name + '</div>' +
      '<div class="job-badges">' +
        getLevelBadge(j.level) +
        '<span class="badge badge-salary">' + (j.taSubLabel||'') + '</span>' +
      '</div>' +
      '<div class="job-footer">' +
        '<span class="job-deadline ' + dlClass + '">⏰ ' + dlText + '</span>' +
        '<span class="job-source">' + j.source + '</span>' +
      '</div>' +
      (hasJd ? '<div class="jd-section" id="jd-' + j.id + '">' +
        '<div class="jd-label">岗位职责 & 要求</div>' +
        '<div class="jd-content">' + j.jd.replace(/\n/g, '<br>') + '</div>' +
        '<a href="' + j.url + '" target="_blank" class="apply-btn">申请岗位 →</a>' +
       '</div>' : '<a href="' + j.url + '" target="_blank" class="apply-btn" style="display:inline-block;margin-top:8px;">申请岗位 →</a>');

    el.addEventListener('click', function(e) {
      if (hasJd) {
        var jdEl = document.getElementById('jd-' + j.id);
        if (jdEl) { jdEl.classList.toggle('open'); e.stopPropagation(); }
      }
      focusJob(j.id);
    });
    list.appendChild(el);
  });
}

// 地图
var map = L.map('map', {zoomControl:true, scrollWheelZoom:true}).setView([31.2304, 121.4737], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'&copy; OSM', maxZoom:19}).addTo(map);
var markerMap = {};

var levelColor = {'intern':'#22c55e','entry':'#06b6d4','mid':'#f59e0b','senior':'#a855f7','lead':'#ef4444'};

function mkIcon(color, sz, isNew) {
  var glow = isNew ? 'box-shadow:0 0 12px ' + color + ', 0 0 24px ' + color + '40;' : 'box-shadow:0 3px 12px rgba(0,0,0,0.35);';
  return L.divIcon({className:'', html:'<div style="width:'+sz+'px;height:'+sz+'px;background:'+color+';border:2.5px solid rgba(255,255,255,0.9);border-radius:50%;'+glow+'"></div>', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]});
}

function buildPopup(j) {
  return '<div class="popup-title">' + j.name + '</div>' +
    '<div class="popup-company">' + j.company + ' · ' + j.city + '</div>' +
    '<div class="popup-meta">' + getLevelBadge(j.level) + ' ' + (j.salary!=='—'?'<span style="color:#818cf8;">'+j.salary+'</span> ':'') + '</div>' +
    '<a href="' + j.url + '" target="_blank" class="popup-link">查看岗位 →</a>';
}

function renderMarkers(jobs) {
  Object.values(markerMap).forEach(function(m){ map.removeLayer(m); });
  markerMap = {};
  jobs.forEach(function(j) {
    var sz = j.level === 'intern' ? 16 : j.level === 'senior' || j.level === 'lead' ? 20 : 14;
    var isNew = j.postedDate === todayStr;
    var m = L.marker(getCoords(j.city), {icon: mkIcon(levelColor[j.level]||'#6366f1', sz, isNew)}).addTo(map);
    m.bindPopup(buildPopup(j));
    m.on('click', function(){ focusJob(j.id); });
    markerMap[j.id] = m;
  });
}

function focusJob(id) {
  document.querySelectorAll('.job-card').forEach(function(c){ c.classList.remove('focused'); });
  var card = document.getElementById('card-' + id);
  if(card) { card.classList.add('focused'); card.scrollIntoView({behavior:'smooth', block:'nearest'}); }
  var m = markerMap[id];
  if(m) { m.openPopup(); map.setView(m.getLatLng(), 10); }
}

function renderStats() {
  var counts = {intern:0, entry:0, mid:0, senior:0, lead:0};
  allJobs.forEach(function(j){ if(counts.hasOwnProperty(j.level)!==undefined) counts[j.level]++; });
  document.getElementById('header-stats').innerHTML =
    '<span class="header-stat intern">' + counts.intern + ' 实习</span>' +
    '<span class="header-stat entry">' + counts.entry + ' 1年以下</span>' +
    '<span class="header-stat mid">' + counts.mid + ' 1-3年</span>';
}

// Filter tabs
document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    var filtered = getFiltered();
    renderList(filtered);
    renderMarkers(filtered);
  });
});

// Load data
async function loadData() {
  try {
    var resp = await fetch('data/jobs-domestic.json');
    var data = await resp.json();
    allJobs = (data.domesticJobs||data||[]).filter(function(j){ return !j.excluded; });

    var total = allJobs.length;
    document.getElementById('header-title').textContent = '国内 TA 岗位';
    document.getElementById('header-meta').textContent = '更新于 ' + (data.updated||todayStr) + ' · 共 ' + total + ' 个';
    document.title = '国内 TA 岗位（' + total + '） — TA Job Finder';

    renderStats();
    renderList(getFiltered());
    renderMarkers(getFiltered());
  } catch(e) {
    document.getElementById('job-list').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);">数据加载失败</div>';
  }
}

loadData();
</script>
</body>
</html>
