<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TA Job Finder — 技术美术求职</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --card: #16161d;
      --card-hover: #1e1e28;
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.15);
      --text: #f1f1f4;
      --text-muted: #71717a;
      --border: rgba(255,255,255,0.06);
      --intern: #22c55e;
      --entry: #06b6d4;
      --mid: #f59e0b;
      --senior: #a855f7;
      --lead: #ef4444;
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    /* ===== Hero ===== */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 600px;
      background: radial-gradient(ellipse, var(--primary-glow) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 24px;
      animation: fadeUp 0.6s ease both;
    }
    .hero-badge .dot {
      width: 6px; height: 6px;
      background: var(--primary);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
      text-align: center;
      animation: fadeUp 0.6s 0.1s ease both;
    }
    .hero-sub {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-align: center;
      animation: fadeUp 0.6s 0.15s ease both;
    }
    .hero-date {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 48px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    /* ===== Quick Stats ===== */
    .quick-stats {
      display: flex;
      gap: 16px;
      margin-bottom: 48px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.6s 0.25s ease both;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 0.85rem;
    }
    .stat-pill .num {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-pill .label {
      color: var(--text-muted);
    }
    .stat-pill.intern .num { color: var(--intern); }
    .stat-pill.entry .num { color: var(--entry); }
    .stat-pill.mid .num { color: var(--mid); }

    /* ===== Nav Grid ===== */
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 720px;
      width: 100%;
      animation: fadeUp 0.6s 0.3s ease both;
    }
    .nav-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .nav-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--primary-glow), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .nav-card:hover {
      border-color: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(99,102,241,0.12);
    }
    .nav-card:hover::before { opacity: 1; }

    .card-icon {
      font-size: 2.2rem;
      margin-bottom: 12px;
      display: block;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .card-count {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .card-arrow {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.75rem;
      color: var(--primary);
      opacity: 0;
      transform: translateX(-4px);
      transition: all 0.2s;
    }
    .nav-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* Priority banner */
    .priority-section {
      max-width: 720px;
      width: 100%;
      margin-top: 48px;
      animation: fadeUp 0.6s 0.35s ease both;
    }
    .priority-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .priority-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .priority-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .priority-item:hover {
      border-color: var(--primary);
      background: var(--card-hover);
    }
    .priority-rank {
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--primary);
      width: 18px;
      flex-shrink: 0;
    }
    .priority-info { flex: 1; }
    .priority-company {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .priority-title {
      font-size: 0.78rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .priority-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .badge-intern { background: rgba(34,197,94,0.15); color: var(--intern); }
    .badge-entry { background: rgba(6,182,212,0.15); color: var(--entry); }
    .badge-mid { background: rgba(245,158,11,0.15); color: var(--mid); }
    .badge-new { background: rgba(99,102,241,0.15); color: var(--primary); }

    /* Category chips */
    .category-section {
      max-width: 720px;
      width: 100%;
      margin-top: 40px;
      animation: fadeUp 0.6s 0.4s ease both;
    }
    .category-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .cat-chip {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .cat-chip .count {
      margin-left: 6px;
      color: var(--primary);
    }
    .cat-chip:hover { border-color: var(--primary); color: var(--text); }

    /* Footer */
    .footer {
      text-align: center;
      padding: 40px 24px;
      font-size: 0.75rem;
      color: var(--text-muted);
      animation: fadeUp 0.6s 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .nav-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .quick-stats { gap: 8px; }
      .stat-pill { padding: 8px 12px; font-size: 0.78rem; }
      .stat-pill .num { font-size: 1rem; }
      .priority-item { padding: 12px 14px; }
    }
    @media (max-width: 400px) {
      .nav-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">
    <span class="dot"></span>
    数据实时更新
  </div>

  <h1>TA Job Finder</h1>
  <p class="hero-sub">技术美术岗位 · 实习 / 校招 / 社招</p>
  <p class="hero-date" id="date-display"></p>

  <div class="quick-stats">
    <div class="stat-pill intern">
      <span class="num" id="stat-intern">—</span>
      <span class="label">实习岗</span>
    </div>
    <div class="stat-pill entry">
      <span class="num" id="stat-entry">—</span>
      <span class="label">1年以下</span>
    </div>
    <div class="stat-pill mid">
      <span class="num" id="stat-mid">—</span>
      <span class="label">1-3年</span>
    </div>
    <div class="stat-pill">
      <span class="num" id="stat-total">—</span>
      <span class="label">全部岗位</span>
    </div>
  </div>

  <div class="nav-grid">
    <a href="boss.html" class="nav-card">
      <span class="card-icon">🇨🇳</span>
      <div class="card-title">国内岗位</div>
      <div class="card-count" id="stat-domestic">— 个</div>
      <span class="card-arrow">查看 →</span>
    </a>
    <a href="overseas.html" class="nav-card">
      <span class="card-icon">🌎</span>
      <div class="card-title">海外岗位</div>
      <div class="card-count" id="stat-overseas">— 个</div>
      <span class="card-arrow">查看 →</span>
    </a>
    <a href="portfolios.html" class="nav-card">
      <span class="card-icon">🎬</span>
      <div class="card-title">TA 作品集</div>
      <div class="card-count" id="stat-portfolios">— 个</div>
      <span class="card-arrow">查看 →</span>
    </a>
  </div>

  <div class="priority-section">
    <div class="priority-label">优先投递 · 实习 & 校招</div>
    <div class="priority-list" id="priority-list">
      <div style="color:var(--text-muted);font-size:0.85rem;padding:20px;text-align:center;">加载中...</div>
    </div>
  </div>

  <div class="category-section">
    <div class="priority-label">岗位方向分布</div>
    <div class="category-chips" id="category-chips"></div>
  </div>
</div>

<footer class="footer">
  TA Job Finder · 数据来源：51Job / LinkedIn / Indeed / B站 · 仅供参考
</footer>

<script>
var today = new Date();
var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
document.getElementById('date-display').textContent =
  today.getFullYear() + ' 年 ' + (today.getMonth()+1) + ' 月 ' + today.getDate() + ' 日';

Promise.all([
  fetch('jobs-domestic.json').then(function(r){ return r.json().catch(function(){ return {}; }); }),
  fetch('jobs-overseas.json').then(function(r){ return r.json().catch(function(){ return {}; }); }),
  fetch('portfolios.json').then(function(r){ return r.json().catch(function(){ return {}; }); }),
]).then(function(results) {
  var dom = results[0];
  var over = results[1];
  var ports = results[2];

  var domJobs = (dom.domesticJobs||[]).filter(function(j){ return !j.excluded; });
  var overJobs = (over.overseasJobs||[]).filter(function(j){ return !j.excluded; });
  var total = domJobs.length + overJobs.length;

  // 经验分布
  var levelCounts = {intern:0, entry:0, mid:0, senior:0, lead:0};
  domJobs.forEach(function(j){
    if(levelCounts.hasOwnProperty(j.level)) levelCounts[j.level]++;
  });

  document.getElementById('stat-intern').textContent = levelCounts.intern;
  document.getElementById('stat-entry').textContent = levelCounts.entry;
  document.getElementById('stat-mid').textContent = levelCounts.mid;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-domestic').textContent = domJobs.length + ' 个';
  document.getElementById('stat-overseas').textContent = overJobs.length + ' 个';
  document.getElementById('stat-portfolios').textContent = (ports.portfolios||[]).length + ' 个';

  // 优先投递列表（intern > entry > mid，按 deadline 排序）
  var priorityJobs = domJobs
    .filter(function(j){ return j.level === 'intern' || j.level === 'entry' || j.level === 'mid'; })
    .sort(function(a,b){
      var levelOrder = {intern:0, entry:1, mid:2};
      if(levelOrder[a.level] !== levelOrder[b.level]) return levelOrder[a.level] - levelOrder[b.level];
      return a.daysLeft - b.daysLeft;
    })
    .slice(0, 6);

  var priorityList = document.getElementById('priority-list');
  if(priorityJobs.length > 0) {
    priorityList.innerHTML = priorityJobs.map(function(j, i){
      var badgeClass = j.level === 'intern' ? 'badge-intern' : j.level === 'entry' ? 'badge-entry' : 'badge-mid';
      var badgeText = j.level === 'intern' ? '实习' : j.level === 'entry' ? '1年以下' : '1-3年';
      var newTag = j.postedDate === todayStr ? '<span class="priority-badge badge-new">NEW</span>' : '';
      return '<div class="priority-item" onclick="location.href=\'boss.html\'">' +
        '<span class="priority-rank">#' + (i+1) + '</span>' +
        '<div class="priority-info">' +
          '<div class="priority-company">' + j.company + ' · ' + j.city + '</div>' +
          '<div class="priority-title">' + j.name + '</div>' +
        '</div>' +
        '<span class="priority-badge ' + badgeClass + '">' + badgeText + '</span>' +
        newTag +
      '</div>';
    }).join('');
  } else {
    priorityList.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;padding:20px;text-align:center;">暂无数据</div>';
  }

  // TA 方向分布
  var taCounts = {};
  domJobs.forEach(function(j){
    var cat = j.taSubCategory || 'general';
    taCounts[cat] = (taCounts[cat]||0) + 1;
  });
  var taLabels = {rendering:'渲染 TA', character:'角色 TA', pipeline:'流程 TA',
                  environment:'环境 TA', ui:'UI TA', general:'综合 TA'};
  var taColors = {rendering:'#f59e0b', character:'#a855f7', pipeline:'#22c55e',
                  environment:'#06b6d4', ui:'#ef4444', general:'#6366f1'};

  var chipsEl = document.getElementById('category-chips');
  chipsEl.innerHTML = Object.entries(taCounts)
    .sort(function(a,b){ return b[1]-a[1]; })
    .map(function(entry){
      var cat = entry[0], count = entry[1];
      return '<span class="cat-chip" style="border-color:' + (taColors[cat]||'#6366f1') + '22;color:' + (taColors[cat]||'#6366f1') + ';">' +
        (taLabels[cat]||cat) + '<span class="count">' + count + '</span></span>';
    }).join('');

}).catch(function(e){
  console.error('Data load error:', e);
});
</script>
</body>
</html>
